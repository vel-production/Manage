<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PixelDrop Vault</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #07090f;
      --surface: #0d1117;
      --surface2: #111827;
      --border: #ffffff0f;
      --border2: #ffffff18;
      --text: #e2e8f0;
      --muted: #6b7280;
      --muted2: #374151;
      --accent: #6366f1;
      --accent2: #8b5cf6;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --mono: 'Inter', sans-serif;
      --body: 'Inter', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 15px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--body);
      min-height: 100vh;
    }

    button {
      cursor: pointer;
      font-family: var(--body);
      transition: opacity .15s, background .15s, border-color .15s;
    }

    button:active {
      opacity: .75;
    }

    input,
    textarea,
    select {
      font-family: var(--body);
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: transparent;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }

    .logo-icon img,
    .login-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .login-avatar {
      width: 72px;
      height: 72px;
      border-radius: 22px;
      margin: 0 auto;
      overflow: hidden;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: 1px solid var(--border2);
    }

    .logo-title {
      font-family: var(--body);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.2px;
      color: var(--text);
    }

    .logo-sub {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--mono);
      margin-top: 1px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .role-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 20px;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      border: 1px solid;
    }

    .role-badge.admin {
      background: #6366f115;
      border-color: #6366f130;
      color: #a5b4fc;
    }

    .role-badge.worker {
      background: #ffffff08;
      border-color: var(--border2);
      color: var(--muted);
    }

    .btn-ghost {
      background: #ffffff08;
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 6px 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .btn-refresh {
      background: none;
      border: none;
      color: var(--muted2);
      padding: 6px;
      border-radius: 6px;
      font-size: 18px;
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 16px 80px;
    }

    #login-screen {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 36px;
      width: 100%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 32px 80px #0009;
    }

    .login-card h2 {
      font-family: var(--mono);
      font-size: 19px;
      color: var(--text);
      margin: 16px 0 6px;
    }

    .login-card p {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 28px;
    }

    .login-section {
      background: #1f293780;
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 14px;
    }

    .login-section small {
      display: block;
      color: #9ca3af;
      font-size: 12px;
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .pass-wrap {
      position: relative;
      margin-bottom: 12px;
    }

    .pass-wrap input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 10px 40px 10px 12px;
      color: var(--text);
      font-size: 14px;
      letter-spacing: 3px;
      text-align: center;
      outline: none;
    }

    .pass-toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #555;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 8px;
      padding: 11px 20px;
      color: #fff;
      font-size: 14px;
      font-family: var(--mono);
      font-weight: 700;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-worker {
      background: #ffffff08;
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 11px 20px;
      color: var(--muted);
      font-size: 14px;
      width: 100%;
    }

    .err-msg {
      color: #f87171;
      font-size: 12px;
      margin-bottom: 10px;
    }

    .stats,
    .cat-stats {
      display: grid;
      gap: 10px;
      margin-bottom: 14px;
    }

    .stats {
      grid-template-columns: repeat(3, 1fr);
    }

    .cat-stats {
      grid-template-columns: repeat(4, 1fr);
      margin-bottom: 22px;
    }

    .stat-card,
    .cat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
    }

    .cat-card {
      cursor: pointer;
    }
    
    .cat-card {
      transition: 0.2s;
    }
    
    .cat-card.active {
      border: 1px solid #8b5cf6;
      box-shadow: 0 0 25px #8b5cf660;
    }

    .cat-card.active {
      border: 1px solid #8b5cf6;
      box-shadow: 0 0 25px #8b5cf660;
    }
    .cat-card.active {
      border-color: #6366f150;
      background: #6366f112;
    }

    .stat-val,
    .cat-num {
      font-family: var(--mono);
      font-size: 26px;
      font-weight: 700;
    }

    .cat-num {
      font-size: 18px;
    }

    .stat-lbl,
    .cat-row {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
    }

    .cat-name {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .cat-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .tab-btn {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
    }

    .tab-btn.active {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-color: transparent;
      color: #fff;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
      align-items: center;
    }

    .search-wrap {
      flex: 1;
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px 10px 12px;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }

    .btn-add {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      color: #fff;
      font-family: var(--mono);
      font-weight: 700;
      font-size: 13px;
      white-space: nowrap;
    }

    .chips {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .chip {
      padding: 5px 13px;
      border-radius: 20px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-family: var(--mono);
    }

    .chip.active {
      border-color: var(--accent);
      background: #6366f118;
      color: #a5b4fc;
    }

    .sync-info {
      text-align: right;
      font-size: 11px;
      color: var(--muted2);
      font-family: var(--mono);
      margin-bottom: 16px;
    }

    .cards {
      display: grid;
      gap: 12px;
    }

    .empty {
      text-align: center;
      color: var(--muted2);
      padding: 48px 0;
      font-family: var(--mono);
      font-size: 13px;
    }

    .acc-card,
    .cdk-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
    }

    .cdk-card.active {
      border: 2px solid #22c55e30;
    }

    .cdk-card.used {
      border: 2px solid #ef444428;
      opacity: .65;
    }

    .card-head,
    .cdk-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .type-badge,
    .category-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 8px;
      font-family: var(--mono);
      font-size: 12px;
      background: #6366f118;
      color: #a5b4fc;
    }

    .cat-img {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      object-fit: cover;
      vertical-align: middle;
      margin-right: 8px;
    }

    .type-xbox {
      background: #107c1018;
      color: #86efac;
    }

    .type-itunes {
      background: #fc3c4418;
      color: #fda4af;
    }

    .price-badge {
      background: #f59e0b15;
      color: #fbbf24;
      border-radius: 8px;
      padding: 3px 10px;
      font-family: var(--mono);
      font-size: 12px;
    }

    .card-actions,
    .cdk-controls {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn-icon {
      border-radius: 6px;
      padding: 5px 7px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-edit {
      background: #ffffff08;
      border: 1px solid var(--border2);
      color: var(--muted);
    }

    .btn-del {
      background: #ef444410;
      border: 1px solid #ef444430;
      color: #f87171;
    }

    .card-fields {
      display: grid;
      gap: 10px;
    }

    .field-row {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .field-key {
      color: #4b5563;
      font-size: 11px;
      width: 48px;
      font-family: var(--mono);
      flex-shrink: 0;
    }

    .field-val {
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .field-val.pass {
      letter-spacing: 4px;
    }

    .field-val.pass.show {
      letter-spacing: 1px;
    }

    .field-note {
      background: #ffffff05;
      border-radius: 8px;
      padding: 7px 10px;
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
    }

    .cdk-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 14px;
      color: var(--text);
      flex-wrap: wrap;
    }

    .btn-toggle {
      padding: 4px 13px;
      border-radius: 20px;
      border: none;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
    }

    .btn-toggle.active {
      background: #22c55e18;
      color: #4ade80;
    }

    .btn-toggle.used {
      background: #ef444418;
      color: #f87171;
    }

    .cdk-code-box {
      background: #060a10;
      border-radius: 10px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .cdk-code {
      font-family: var(--mono);
      font-size: 15px;
      letter-spacing: 3px;
      flex: 1;
      overflow-wrap: anywhere;
    }

    .cdk-code.active {
      color: #c4b5fd;
    }

    .cdk-code.masked {
      color: #4b5563;
    }

    .btn-copy,
    .btn-reveal {
      background: #ffffff10;
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 4px 8px;
      color: #888;
      font-size: 11px;
    }

    .btn-copy.ok {
      background: #22c55e18;
      border-color: #22c55e55;
      color: #4ade80;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: #000c;
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .modal-box {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 18px;
      padding: 28px;
      width: 100%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 24px 80px #0009;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .modal-title {
      font-family: var(--mono);
      font-size: 17px;
      color: var(--text);
    }

    .btn-close {
      background: none;
      border: none;
      color: #666;
      padding: 4px;
      font-size: 18px;
    }

    .form-field {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      margin-bottom: 6px;
      font-size: 11px;
      color: var(--muted);
      font-family: var(--mono);
      text-transform: none;
      letter-spacing: 1px;
    }

    .form-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }

    textarea.form-input {
      resize: vertical;
      min-height: 56px;
    }

    .form-input.code-inp {
      font-family: var(--mono);
      letter-spacing: 2px;
      font-size: 13px;
    }

    .pass-field {
      position: relative;
    }

    .pass-field .form-input {
      padding-right: 40px;
    }

    .pass-field .pass-toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #555;
    }

    .type-btns {
      display: flex;
      gap: 8px;
    }

    .type-btn {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 2px solid var(--border2);
      background: transparent;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 13px;
    }

    .type-btn.sel {
      border-color: var(--accent);
      background: #6366f118;
      color: #a5b4fc;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .form-footer {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 4px;
    }

    .btn-cancel {
      background: #ffffff08;
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 10px 20px;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 720px) {
      .stats,
      .cat-stats {
        grid-template-columns: 1fr 1fr;
      }

      .toolbar {
        flex-direction: column;
        align-items: stretch;
      }
    }
    .cat-icon {
  width: 48px;
  height: 48px;
  border-radius: 14px;
  object-fit: contain;
  margin-right: 12px;
}

.cat-icon.spotify { filter: drop-shadow(0 0 14px #22c55e88); }
.cat-icon.claude { filter: drop-shadow(0 0 14px #fb7a4388); }
.cat-icon.chatgpt { filter: drop-shadow(0 0 14px #10b98188); }
.cat-icon.grok {
  filter: invert(1) brightness(1.7) drop-shadow(0 0 14px #8b5cf688);
}
    .actions-bar {
  display: flex;
  gap: 10px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}

.btn-danger {
  background: linear-gradient(135deg, #ef4444, #dc2626);
  border: none;
  border-radius: 10px;
  padding: 10px 14px;
  color: white;
  font-weight: 700;
}

.btn-secondary {
  background: #ffffff10;
  border: 1px solid #ffffff20;
  border-radius: 10px;
  padding: 10px 14px;
  color: #ddd;
  font-weight: 700;
}

.cdk-select {
  width: 18px;
  height: 18px;
  accent-color: #8b5cf6;
}
  </style>
</head>

<body>
  <div id="login-screen">
    <div class="login-card fade">
      <div class="login-avatar">
        <img src="avatar.png" alt="PixelDrop avatar" />
      </div>

      <h2>PIXELDROP VAULT</h2>
      <p>Xbox · iTunes · CDK</p>

      <div class="login-section">
        <small>Введіть пароль адміна для повного доступу</small>

        <div class="pass-wrap">
          <input
            type="password"
            id="pw-input"
            placeholder="Пароль адміна"
            onkeydown="if(event.key==='Enter')tryLogin()"
          />

          <button class="pass-toggle" onclick="togglePw('pw-input',this)">
            👁
          </button>
        </div>

        <div class="err-msg" id="pw-err" style="display:none">
          Невірний пароль
        </div>

        <button class="btn-primary" onclick="tryLogin()">
          Увійти як Адмін
        </button>
      </div>

      <button class="btn-worker" onclick="enterAsWorker()">
        Переглянути без пароля
      </button>
    </div>
  </div>

  <div id="app" style="display:none">
    <header>
      <div class="header-inner">
        <div class="logo">
          <div class="logo-icon">
            <img src="avatar.png" alt="PixelDrop avatar" />
          </div>

          <div>
            <div class="logo-title">PixelDrop Vault</div>
            <div class="logo-sub">Xbox · iTunes · CDK</div>
          </div>
        </div>

        <div class="header-right">
          <button class="btn-refresh" onclick="loadData()" title="Оновити">↻</button>
          <div class="role-badge" id="role-badge"></div>
          <button class="btn-ghost" onclick="logout()">Вийти</button>
        </div>
      </div>
    </header>

    <main>
      <div class="stats">
        <div class="stat-card">
          <div class="stat-val" id="s-acc" style="color:#818cf8">0</div>
          <div class="stat-lbl">Акаунти</div>
        </div>

        <div class="stat-card">
          <div class="stat-val" id="s-active" style="color:#4ade80">0</div>
          <div class="stat-lbl">CDK активні</div>
        </div>

        <div class="stat-card">
          <div class="stat-val" id="s-used-total" style="color:#f87171">0</div>
          <div class="stat-lbl">Використані всього</div>
        </div>
      </div>

      <div class="cat-stats" id="cat-stats"></div>

      <div class="sync-info" id="sync-info"></div>

      <div class="tabs">
        <button class="tab-btn active" id="tab-accounts" onclick="switchTab('accounts')">
          👤 Акаунти
        </button>

        <button class="tab-btn" id="tab-cdks" onclick="switchTab('cdks')">
          🔑 CDK Коди
        </button>
      </div>

      <div class="toolbar">
        <div class="search-wrap">
          <input type="text" id="search" placeholder="Пошук..." oninput="render()" />
        </div>

        <button class="btn-add" id="btn-add" onclick="openAddModal()" style="display:none">
          ＋ Додати
        </button>
      </div>

      <div class="chips" id="chips"></div>
      <div class="actions-bar" id="actions-bar"></div>
      <div class="cards" id="cards"></div>
    </main>
  </div>

  <div class="modal-overlay" id="modal" style="display:none" onclick="closeModal()">
    <div class="modal-box fade" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div class="modal-title" id="modal-title"></div>
        <button class="btn-close" onclick="closeModal()">✕</button>
      </div>

      <div id="modal-body"></div>
    </div>
  </div>

  <script>
    const SHEET_ID = '1-yF9f9LepfGBpg1fyhewTcgT7oePscPEScD9v-8Ggn4';

    function startApp() {

    function parseCSV(text) {
      const clean = text.trim();
      if (!clean) return [];

      const lines = clean.split('\n');
      if (lines.length < 2) return [];

      const headers = parseLine(lines[0]);

      return lines.slice(1).map(line => {
        const vals = parseLine(line);
        const obj = {};

        headers.forEach((h, i) => {
          obj[h.trim()] = (vals[i] || '').trim();
        });

        return obj;
      }).filter(r => Object.values(r).some(v => v));
    }

    function parseLine(line) {
      const result = [];
      let cur = '';
      let inQ = false;

      for (let i = 0; i < line.length; i++) {
        const c = line[i];

        if (c === '"') {
          if (inQ && line[i + 1] === '"') {
            cur += '"';
            i++;
          } else {
            inQ = !inQ;
          }
        } else if (c === ',' && !inQ) {
          result.push(cur);
          cur = '';
        } else {
          cur += c;
        }
      }

      result.push(cur);
      return result;
    }

    async function loadData() {
      try {
        const [rA, rC, rS] = await Promise.all([
          fetch(csvAcc + '&t=' + Date.now()),
          fetch(csvCdk + '&t=' + Date.now()),
          fetch(csvStats + '&t=' + Date.now())
        ]);

        accounts = parseCSV(await rA.text()).map((a, i) => ({
          ...a,
          _id: i
        }));

        cdks = parseCSV(await rC.text()).map((c, i) => ({
          ...c,
          _id: i,
          _used: (c.used || '').toLowerCase() === 'true' || c.used === '1',
          category: c.category || 'Spotify'
        }));

        statsRows = parseCSV(await rS.text());

        updateStats();
        render();
        renderCategoryStats();

        document.getElementById('sync-info').textContent =
          '↻ ' + new Date().toLocaleTimeString('uk-UA') + ' · авто-оновлення 15с';
      } catch (e) {
        document.getElementById('sync-info').textContent =
          '⚠ Помилка завантаження — перевір налаштування таблиці';
      }
    }

    function getUsedTotal(category) {
      const row = statsRows.find(s => s.category === category);
      return Number(row?.used_count || 0);
    }

    function updateStats() {
      document.getElementById('s-acc').textContent = accounts.length;

      const active = cdks.filter(c => !c._used).length;
      document.getElementById('s-active').textContent = active;

      const usedTotal = CATEGORIES.reduce((sum, c) => sum + getUsedTotal(c), 0);
      document.getElementById('s-used-total').textContent = usedTotal;
    }

    function renderCategoryStats() {
      const wrap = document.getElementById('cat-stats');

      wrap.innerHTML = CATEGORIES.map(cat => {
        const active = cdks.filter(c => !c._used && c.category === cat).length;
        const usedTotal = getUsedTotal(cat);

        return `
          <div class="cat-card ${filterCategory === cat ? 'active' : ''}" onclick="setCategory('${cat}')">
            <div class="cat-name">${catIcon(cat)} ${cat}</div>

            <div class="cat-row">
              <div>
                <div>Активні</div>
                <div class="cat-num" style="color:#4ade80">${active}</div>
              </div>

              <div>
                <div>Використані</div>
                <div class="cat-num" style="color:#f87171">${usedTotal}</div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function setCategory(cat) {
      filterCategory = filterCategory === cat ? 'all' : cat;
      currentTab = 'cdks';
      switchTab('cdks', true);
      render();
      renderCategoryStats();
    }

    function switchTab(tab, keepCategory = false) {
      currentTab = tab;

      document.getElementById('tab-accounts').className =

      document.getElementById('tab-cdks').className =
        'tab-btn' + (tab === 'cdks' ? ' active' : '');

      document.getElementById('search').value = '';
      filterType = 'all';
      filterUsed = 'all';

      if (!keepCategory && tab !== 'cdks') {
        filterCategory = 'all';
      }

      render();
      renderCategoryStats();
    }

   function renderChips() {
  const c = document.getElementById('chips');

  if (currentTab === 'accounts') {
    c.innerHTML = ['all', 'xbox', 'itunes'].map(v => `
      <button class="chip${filterType === v ? ' active' : ''}" onclick="filterType='${v}';render()">
        ${v === 'all' ? 'Всі' : v === 'xbox' ? 'Xbox' : 'iTunes'}

  } else {
    c.innerHTML = ['all', 'active', 'used'].map(v => `
      <button class="chip${filterUsed === v ? ' active' : ''}" onclick="filterUsed='${v}';render()">
        ${v === 'all' ? 'Всі' : v === 'active' ? '✓ Активні' : '✗ Використані'}
      </button>
    `).join('');
  }
}

function render() {
      renderChips();
      renderActions();

      const q = document.getElementById('search').value.toLowerCase();
      const el = document.getElementById('cards');

      if (currentTab === 'accounts') {
        let list = accounts.filter(a => {
          if (filterType !== 'all' && (a.type || '').toLowerCase() !== filterType) return false;
          if (!q) return true;

          return (
            (a.login || '') +
            (a.note || '') +
            (a.rate || '') +
            (a.type || '')
          ).toLowerCase().includes(q);
        });

        el.innerHTML = list.length
          ? list.map(accCard).join('')
          : '<div class="empty">Акаунтів не знайдено</div>';
      } else {
        let list = cdks.filter(c => {
          if (filterUsed === 'active' && c._used) return false;
          if (filterUsed === 'used' && !c._used) return false;
          if (filterCategory !== 'all' && c.category !== filterCategory) return false;
          if (!q) return true;

          return (
            (c.label || '') +
            (c.code || '') +
            (c.note || '') +
            (c.category || '')
          ).toLowerCase().includes(q);
        });

        el.innerHTML = list.length
          ? list.map(cdkCard).join('')
          : '<div class="empty">Кодів не знайдено</div>';
      }
    }

  function renderActions() {

  el.innerHTML = `

function toggleSelect(id) {
  if (selected.has(id)) selected.delete(id);
  else selected.add(id);
  render();
}

async function deleteSelectedCdks() {
  if (!selected.size) {
    alert('Нічого не вибрано');
    return;
  }

  if (!confirm(`Видалити ${selected.size} вибраних CDK?`)) return;

  await postApi({
    type: 'cdk',
    action: 'deleteRows',
    rows: Array.from(selected)
  });

  selected.clear();
  setTimeout(loadData, 1000);
}

async function deleteFilteredCdks() {
  const list = cdks.filter(c => {
    if (filterUsed === 'active' && c._used) return false;
    if (filterUsed === 'used' && !c._used) return false;
    if (filterCategory !== 'all' && c.category !== filterCategory) return false;
    return true;
  });

  if (!list.length) {
    alert('Немає що видаляти');
    return;
  }

  if (!confirm(`Видалити ${list.length} CDK з поточного списку?`)) return;

  await postApi({
    type: 'cdk',
    action: 'deleteRows',
    rows: list.map(x => x._id)
  });

  selected.clear();
  setTimeout(loadData, 1000);
}

      const c = cdks[id];
      if (!c) return;

      const newStatus = !c._used;

      await postApi({
        type: 'cdk',
        action: 'toggle',
        row: id,
        used: newStatus ? 'TRUE' : 'FALSE'
      });

      setTimeout(loadData, 1000);

        action: 'delete',
        row: id

      setTimeout(loadData, 1000);

    let copyTimers = {};

      navigator.clipboard.writeText(text).then(() => {
        btnEl.innerHTML = '✓ OK';
        btnEl.classList.add('ok');

        clearTimeout(copyTimers[text]);

        copyTimers[text] = setTimeout(() => {
          btnEl.innerHTML = '📋 Копія';
          btnEl.classList.remove('ok');
        }, 1400);
      });
    }

    function copyBtn(text) {
      return `<button class="btn-copy" onclick="copyText('${esc(text)}',this)">📋 Копія</button>`;
    }

    async function saveCdkForm() {
  const isEdit = editId !== null;
  const category = document.getElementById('f-category').value;
  const used = document.getElementById('f-status').value === 'true' ? 'TRUE' : 'FALSE';
  const note = document.getElementById('f-note').value;

  if (!isEdit) {
    const raw = document.getElementById('f-bulk-codes').value;

    const codes = raw
      .match(/[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}/g)
      ?.map(x => x.trim().toUpperCase()) || [];

    if (!codes.length) {
      alert('Не знайшов CDK коди. Встав коди формату 67c72481-378f-49ae-a6b1-9cbb9236e280');
      return;
    }

    await postApi({
      type: 'cdk',
      action: 'bulkAdd',
      category,
      label: category,
      used,
      note,
      codes
    });

  } else {
    await postApi({
      type: 'cdk',
      action: 'update',
      row: editId,
      label: category,
      code: document.getElementById('f-code').value,
      used,
      note,
      category
    });
  }

  closeModal();
  setTimeout(loadData, 1000);
}

    function togglePw(id, btn) {
      const inp = document.getElementById(id);
      inp.type = inp.type === 'password' ? 'text' : 'password';
      btn.innerHTML = inp.type === 'password' ? '👁' : '🙈';
    }

    function catIcon(cat) {

    ChatGPT: ['chatgpt.png', 'chatgpt'],

  if (!item) return '🔑';

  return `<img src="${item[0]}" class="cat-icon ${item[1]}" alt="${cat}">`;
}

        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')

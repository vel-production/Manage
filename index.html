  <style>
    .acc-card-compact {
  padding: 18px 20px;
}

.acc-compact-top {
  display: grid;
  grid-template-columns: minmax(220px, 1fr) auto auto;
  align-items: center;
  gap: 16px;
  padding-bottom: 14px;
  border-bottom: 1px solid #ffffff12;
}

.acc-compact-brand {
  display: flex;
  align-items: center;
  gap: 12px;
}

.acc-compact-icon {
  width: 42px;
  height: 42px;
  border-radius: 12px;
  object-fit: contain;
}

.acc-compact-title {
  font-size: 21px;
  font-weight: 800;
  color: #f8fafc;
}

.acc-compact-rate {
  display: inline-flex;
  margin-top: 6px;
  padding: 5px 10px;
  border-radius: 10px;
  background: #f59e0b18;
  border: 1px solid #f59e0b55;
  color: #facc15;
  font-weight: 800;
  font-size: 14px;
}

.acc-compact-balance {
  text-align: left;
  min-width: 110px;
}

.acc-compact-balance span {
  display: block;
  color: #94a3b8;
  font-size: 13px;
  font-weight: 700;
}

.acc-compact-balance b {
  color: #4ade80;
  font-size: 24px;
  font-weight: 900;
}

.acc-compact-actions {
  display: flex;
  gap: 8px;
}

.acc-compact-grid {
  display: grid;
  grid-template-columns: 1.1fr 1fr 1.2fr;
  gap: 0;
}

.acc-compact-field {
  min-width: 0;
  display: grid;
  grid-template-columns: 72px minmax(0, 1fr) auto auto;
  align-items: center;
  gap: 10px;
  padding: 14px 12px;
  border-right: 1px solid #ffffff10;
}

.acc-compact-field:last-child {
  border-right: none;
}

.acc-compact-field span {
  color: #94a3b8;
  font-size: 12px;
  font-weight: 800;
}

.acc-compact-field b {
  color: #f8fafc;
  font-size: 15px;
  font-weight: 700;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.acc-compact-field .btn-copy {
  min-width: 46px;
  width: 46px;
  height: 46px;
  padding: 0;
  border-radius: 14px;

  display: flex;
  align-items: center;
  justify-content: center;
  place-self: center;

  background: #7c3aed18;
  border: 1px solid #8b5cf680;
  color: #c4b5fd;

  font-size: 22px;
  line-height: 1;
  box-shadow: 0 0 16px #8b5cf633;
}

.acc-compact-field .btn-copy:hover {
  background: #8b5cf622;
  border-color: #a78bfa;
  color: #ede9fe;
  box-shadow: 0 0 22px #8b5cf666;
}

.acc-compact-field .btn-copy svg {
  width: 22px;
  height: 22px;
  display: block;
  stroke: currentColor;
}

.acc-compact-field .btn-copy::before {
  content: none !important;
}

.acc-compact-field .btn-copy.ok {
  background: #22c55e18;
  border-color: #22c55e66;
  color: #86efac;
}
.btn-eye {
  min-width: 46px;
  width: 46px;
  height: 46px;
  padding: 0;
  border-radius: 14px;

  display: flex;
  align-items: center;
  justify-content: center;
  place-self: center;

  background: #7c3aed18;
  border: 1px solid #8b5cf680;
  color: #c4b5fd;

  line-height: 1;
  box-shadow: 0 0 16px #8b5cf633;
}

.btn-eye:hover {
  background: #8b5cf622;
  border-color: #a78bfa;
  color: #ede9fe;
  box-shadow: 0 0 22px #8b5cf666;
}

.btn-eye svg {
  width: 23px;
  height: 23px;
  display: block;
  stroke: currentColor;
}    

@media (max-width: 768px) {
  .acc-card-compact {
    padding: 16px;
  }

  .acc-compact-top {
    grid-template-columns: 1fr auto;
  }

  .acc-compact-balance {
    grid-column: 1 / 2;
  }

  .acc-compact-actions {
    grid-column: 2 / 3;
    grid-row: 1 / 3;
    align-self: center;
  }

  .acc-compact-grid {
    grid-template-columns: 1fr;
  }

  .acc-compact-field {
    grid-template-columns: 70px minmax(0, 1fr) auto auto;
    border-right: none;
    border-bottom: 1px solid #ffffff10;
    padding: 14px 0;
  }

  .acc-compact-field:last-child {
    border-bottom: none;
  }
}
    .worker-login {
  display: grid;
  gap: 10px;
  margin-top: 14px;
}

.worker-input {
  width: 100%;
  background: var(--bg);

}
    :root {
      --bg: #07090f;
      --surface: #0d1117;
      --surface2: #111827;
      --border: #ffffff0f;
      --border2: #ffffff18;
      --text: #e2e8f0;
      --muted: #6b7280;
      --muted2: #374151;
      --accent: #6366f1;
      --accent2: #8b5cf6;

      --red: #ef4444;
      --yellow: #f59e0b;
      --mono: 'Inter', sans-serif;
      --body: 'Inter', sans-serif;

      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {

    }

      color: var(--text);
      font-family: var(--body);
      min-height: 100vh;
    }

    button {
      cursor: pointer;
      font-family: var(--body);
      transition: opacity .15s, background .15s, border-color .15s;
    }

    button:active {
      opacity: .75;
    }

    input,
    textarea,
    select {
      font-family: var(--body);
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 1180px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
  width: 44px;
  height: 44px;
  background: transparent;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  flex-shrink: 0;
}

    .logo-icon img,
    .login-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .login-avatar {
  width: 82px;
  height: 82px;
  border-radius: 50%;
  margin: 0 auto;
  overflow: hidden;
  background: transparent;
  border: none;
  box-shadow: none;
}

    .logo-title {
      font-family: var(--body);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.2px;
      color: var(--text);
    }

    .logo-sub {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--mono);
      margin-top: 1px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .role-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 20px;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      border: 1px solid;
    }

    .role-badge.admin {
  position: relative;
  overflow: hidden;
  background: linear-gradient(135deg, #312e81, #4c1d95, #6d28d9);
  border-color: #8b5cf680;
  color: #ede9fe;
  box-shadow:
    0 0 18px #8b5cf655,
    inset 0 0 18px #ffffff12;
  animation: adminPulse 2.4s ease-in-out infinite;
}

.role-badge.admin::before {
  content: "";
  position: absolute;
  top: 0;
  left: -80%;
  width: 60%;
  height: 100%;
  background: linear-gradient(90deg, transparent, #ffffff45, transparent);
  transform: skewX(-20deg);
  animation: adminShine 3s infinite;
}

@keyframes adminPulse {
  0%, 100% {
    box-shadow: 0 0 14px #8b5cf655, inset 0 0 18px #ffffff12;
  }
  50% {
    box-shadow: 0 0 28px #8b5cf6aa, inset 0 0 22px #ffffff18;
  }
}

@keyframes adminShine {
  0% { left: -80%; }
  45%, 100% { left: 130%; }
}

    .role-badge.worker {
  position: relative;
  overflow: hidden;
  background: linear-gradient(135deg, #064e3b, #0f766e, #0891b2);
  border-color: #22d3ee80;
  color: #ecfeff;
  box-shadow:
    0 0 18px #22d3ee55,
    inset 0 0 18px #ffffff12;
  animation: workerPulse 2.4s ease-in-out infinite;
}

.role-badge.worker::before {
  content: "";
  position: absolute;
  top: 0;
  left: -80%;
  width: 60%;
  height: 100%;
  background: linear-gradient(90deg, transparent, #ffffff45, transparent);
  transform: skewX(-20deg);
  animation: adminShine 3s infinite;
}

@keyframes workerPulse {
  0%, 100% {
    box-shadow: 0 0 14px #22d3ee55, inset 0 0 18px #ffffff12;
  }
  50% {
    box-shadow: 0 0 28px #22d3eeaa, inset 0 0 22px #ffffff18;
  }
}

    function parseCSV(text) {
      const clean = text.trim();
      if (!clean) return [];

      const lines = clean.split('\n');
      if (lines.length < 2) return [];

      const headers = parseLine(lines[0]);

      return lines.slice(1).map(line => {
        const vals = parseLine(line);
        const obj = {};

        headers.forEach((h, i) => {
          obj[h.trim()] = (vals[i] || '').trim();
        });

        return obj;
      }).filter(r => Object.values(r).some(v => v));
    }

    function parseLine(line) {
      const result = [];
      let cur = '';
      let inQ = false;

      for (let i = 0; i < line.length; i++) {
        const c = line[i];

        if (c === '"') {
          if (inQ && line[i + 1] === '"') {
            cur += '"';
            i++;
          } else {
            inQ = !inQ;
          }
        } else if (c === ',' && !inQ) {
          result.push(cur);
          cur = '';
        } else {
          cur += c;
        }
      }

      result.push(cur);
      return result;
    }

    async function loadCSV(url) {
  try {
    const r = await fetch(url + '&t=' + Date.now());
    if (!r.ok) return [];
    return parseCSV(await r.text());
  } catch (e) {
    console.error('CSV error:', url, e);
    return [];
  }
}

      category: c.category || 'Spotify',
      note: String(c.note || '').toLowerCase() === 'false' ? '' : (c.note || ''),
      used_at: c.used_at || '',
      used_by: c.used_by || ''
    }));

    statsRows = statsRaw;

    profitRows = profitRaw.map((r, i) => {
  const vals = Object.values(r);

  return {
    _row: i,
    game: String(r.game || vals[0] || '').trim(),
    product: String(r.product || vals[1] || '').trim(),
    sell_rub: String(r.sell_rub || vals[2] || '').trim(),
    buy_usd: String(r.buy_usd || vals[3] || '').trim(),
    match: String(r.match || vals[4] || '').trim()
  };
});

    function getUsedTotal(category) {
  return cdks.filter(c => c._used && c.category === category).length;
}
    
function getUsedTotal(category) {
  return statsRows
    .filter(s => s.category === category)
    .reduce((sum, s) => sum + Number(s.used_count || 0), 0);
}

function getUsedToday(category) {
  const now = new Date();
  const today =
    now.getFullYear() + '-' +
    String(now.getMonth() + 1).padStart(2, '0') + '-' +
    String(now.getDate()).padStart(2, '0');

  return statsRows
    .filter(s => normalizeDate(s.date) === today && s.category === category)
    .reduce((sum, s) => sum + Number(s.used_count || 0), 0);
}

function normalizeDate(value) {
  const v = String(value || '').trim();
  if (!v) return '';

  if (/^\d{4}-\d{2}-\d{2}/.test(v)) return v.slice(0, 10);

  const m = v.match(/Date\((\d+),(\d+),(\d+)\)/);
  if (m) {
    return `${m[1]}-${String(Number(m[2]) + 1).padStart(2, '0')}-${String(Number(m[3])).padStart(2, '0')}`;
  }

  return v;
}

function calcProfitRow(r, accountRate, playerokRate) {
  const sell = num(r.sell_rub);
  const buyUsd = num(r.buy_usd);
  const buyRub = buyUsd * accountRate * playerokRate;
  const commission = sell * 0.14 + fixedFee(sell);
  const profitRub = sell - commission - buyRub;
  const profitUsd = profitRub / playerokRate;

  return {
    ...r,
    sell,
    buyUsd,
    buyRub,
    commission,
    profitRub,
    profitUsd
  };
}

    type: 'cdk',
    action: 'deleteRows',
    rows: Array.from(selected)
  });

  selected.clear();
  setTimeout(loadData, 1000);
}

async function deleteFilteredCdks() {
  const list = cdks.filter(c => {
    if (filterUsed === 'active' && c._used) return false;
    if (filterUsed === 'used' && !c._used) return false;
    if (filterUsed === 'today') {
    if (!c.used_at) return false;

  const today = new Date().toISOString().slice(0, 10);
  if (!c.used_at.startsWith(today)) return false;
}
    if (filterCategory !== 'all' && c.category !== filterCategory) return false;
    return true;
  });

  if (!list.length) {
    toast('Немає що видаляти', 'err');
  return;
  }

  const ok = await showConfirm(
  'Видалити цей список?',
  `Буде видалено: <b>${list.length}</b> CDK з поточного фільтру. Перед цим буде створена резервна копія.`
);

if (!ok) return;

  await postApi({
    type: 'cdk',
    action: 'deleteRows',
    rows: list.map(x => x._id)
  });

  selected.clear();
  setTimeout(loadData, 1000);
}      

    function cdkCard(c) {
      const adminBtns = isAdmin ? `
  <button class="btn-icon btn-edit" onclick="openEditCdk(${c._id})">${svgEdit}</button>
  <button class="btn-icon btn-del" onclick="deleteCdk(${c._id})">${svgTrash}</button>
` : `
  <button class="btn-icon btn-edit" onclick="openEditCdk(${c._id})">${svgEdit}</button>
`;
      
      const usedBy = c._used && c.used_by
      ? `<div class="field-note" style="margin-top:10px;color:#facc15">👤 Використав: ${esc(c.used_by)}</div>`
      : "";

      const workerToggle = `
        <button class="btn-toggle ${c._used ? 'used' : 'active'}" onclick="workerToggleCdk(${c._id})">
          ${c._used ? '✗ Використано' : '✓ Активний'}
        </button>
      `;

      const codeDisplay = c._used
        ? `
          <span class="cdk-code masked" id="cc-${c._id}">${'•'.repeat((c.code || '').length)}</span>
          <button class="btn-reveal" onclick="revealCdk(${c._id},'${esc(c.code)}')">👁</button>
        `
        : `
          <span class="cdk-code active">${esc(c.code)}</span>
          ${copyBtn(c.code)}
        `;

      return `
        <div class="cdk-card ${c._used ? 'used' : 'active'}">
          <div class="cdk-head">
            <div class="cdk-title">
              ${isAdmin ? `<input type="checkbox" class="cdk-select" ${selected.has(c._id) ? 'checked' : ''} onclick="event.stopPropagation();toggleSelect(${c._id})">` : ''}
              ${catIcon(c.category)}
              ${esc(c.category || 'CDK')}
      
            </div>

            <div class="cdk-controls">
              ${workerToggle}
              ${adminBtns}
            </div>
          </div>

          <div class="cdk-code-box">
            ${codeDisplay}
          </div>

          ${usedBy}

          ${c.note && String(c.note).toLowerCase() !== 'false'
          ? `<div class="field-note" style="margin-top:10px">${esc(c.note)}</div>`
          : ''}
        </div>
      `;
    }

    function revealCdk(id, code) {
      const el = document.getElementById('cc-' + id);
      if (!el) return;

      el.textContent = el.textContent.includes('•')
        ? code
        : '•'.repeat(code.length);
    }

    async function postApi(payload) {
  await fetch(API_URL, {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify({
      ...payload,
      user: currentUser || localStorage.getItem("workerName") || "Unknown"
    })
  });
}

    async function workerToggleCdk(id) {
  const c = cdks[id];
  if (!c) return;

  const newStatus = !c._used;

  await postApi({
    type: "cdk",
    action: "toggle",
    row: id,
    used: newStatus ? "TRUE" : "FALSE"
  });

  setTimeout(loadData, 1000);
}

    async function deleteCdk(id) {

  );

  if (!ok) return;

  await postApi({
    type: 'cdk',
    action: 'delete',
    row: id
  });

}

    let copyTimers = {};

    async function deleteAccount(id) {

    'Видалити акаунт?',

    function copyText(text, btnEl) {
      navigator.clipboard.writeText(text).then(() => {
        btnEl.innerHTML = '<span class="copy-check">✓</span>';
        btnEl.classList.add('ok');

        clearTimeout(copyTimers[text]);

        copyTimers[text] = setTimeout(() => {
          btnEl.innerHTML = `
  <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
    <rect x="9" y="9" width="13" height="13" rx="2"></rect>
    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
  </svg>
`;
          btnEl.classList.remove('ok');
        }, 1400);
      });
    }

    function copyBtn(text) {
  return `
    <button class="btn-copy" onclick="copyText('${esc(text)}',this)">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="9" y="9" width="13" height="13" rx="2"></rect>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
      </svg>
    </button>
  `;
}

    function openAddModal() {
  editId = null;

  if (currentTab === 'accounts') {
    document.getElementById('modal-title').textContent = 'Новий акаунт';
    document.getElementById('modal-body').innerHTML = accountTypeChoice();
    document.getElementById('modal').style.display = 'flex';

function openAccountForm(type) {
  editId = null;

    type === 'xbox' ? 'Новий Xbox акаунт' : 'Новий App Store акаунт';
  document.getElementById('modal-body').innerHTML = accForm(null, type);
}

function moneyNum(value) {
  return Number(
    String(value || '0')
      .replace(',', '.')
      .replace(/[^\d.]/g, '')
  ) || 0;
}    

function getAccountBalance(type) {
  return accounts
    .filter(a => String(a.type || '').toLowerCase() === type)
    .reduce((sum, a) => {
      const n = String(a.balance || '').replace(',', '.').replace(/[^\d.]/g, '');
      return sum + Number(n || 0);
    }, 0);
}

    function openEditAcc(id) {
      editId = id;
      document.getElementById('modal-title').textContent = 'Редагувати акаунт';
      document.getElementById('modal-body').innerHTML = accForm(accounts[id]);

    }

    function openEditCdk(id) {
      editId = id;
      document.getElementById('modal-title').textContent = 'Редагувати CDK';
      document.getElementById('modal-body').innerHTML = cdkForm(cdks[id]);
      document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
    }

    function accForm(a, forcedType = null) {

    <div>
      <div class="form-field">
        <label class="form-label">Тип</label>

        <div class="type-btns">
          <button class="type-btn${t === 'itunes' ? ' sel' : ''}" id="tb-itunes" onclick="openAccountForm('itunes')">${accIcon('itunes')} App Store</button>
          <button class="type-btn${t === 'xbox' ? ' sel' : ''}" id="tb-xbox" onclick="openAccountForm('xbox')">${accIcon('xbox')} Xbox</button>
        </div>

        <input type="hidden" id="f-type" value="${t}">
      </div>

      <div class="form-field">
        <label class="form-label">${isXbox ? 'Логін / Email' : 'Email'}</label>
        <input class="form-input" id="f-login" value="${esc(a?.login || '')}" placeholder="${isXbox ? 'example@outlook.com' : 'example@gmail.com'}">

        <label class="form-label">Пароль</label>

      </div>

      ${isXbox ? `

          <label class="form-label">2FA Email</label>

        </div>
      ` : `
        <div class="form-field">
          <label class="form-label">Посилання <span style="color:#94a3b8">(необовʼязково)</span></label>
          <input class="form-input" id="f-link" value="${esc(a?.link || '')}" placeholder="https://...">
        </div>
      `}

      <div class="form-field">
        <label class="form-label">Баланс</label>
        <input class="form-input" id="f-balance" value="${esc(a?.balance || '')}" placeholder="Наприклад: 5.00 USD">
      </div>

      <div class="form-field">
        <label class="form-label">Курс</label>
        <input class="form-input" id="f-rate" value="${esc(a?.rate || '')}" placeholder="Наприклад: 40.50">

      <div class="form-field">

function cdkForm(c) {
  const used = c ? c._used : false;
  const cat = c?.category || (filterCategory !== 'all' ? filterCategory : 'Spotify');

  return `
    <div>
      <div class="form-field">
        <label class="form-label">Категорія</label>
        <select class="form-input" id="f-category">
          ${CATEGORIES.map(x => `
            <option value="${x}" ${cat === x ? 'selected' : ''}>${x}</option>
          `).join('')}
        </select>
      </div>

      <div class="form-field">
        <label class="form-label">CDK Код</label>

        ${c ? `
          <input
            class="form-input code-inp"
            id="f-code"

            oninput="this.value=this.value.toUpperCase()"
          >
        ` : `
          <textarea
            class="form-input code-inp"
            id="f-bulk-codes"

      </div>

      <div class="status-row">
        <span class="form-label" style="margin:0">Статус:</span>

        <button
          class="btn-toggle ${used ? 'used' : 'active'}"
          id="f-status-btn"
          onclick="toggleFormStatus()"
        >
          ${used ? '✗ Використано' : '✓ Активний'}
        </button>

        <input type="hidden" id="f-status" value="${used}">
      </div>

      <div class="form-field">
        <label class="form-label">Нотатка</label>
        <textarea class="form-input" id="f-note">${esc(c?.note || '')}</textarea>
      </div>

      <div class="form-footer">
        <button class="btn-cancel" onclick="closeModal()">Скасувати</button>

}

    function selType(t) {
      document.getElementById('f-type').value = t;
      document.getElementById('tb-xbox').className = 'type-btn' + (t === 'xbox' ? ' sel' : '');
      document.getElementById('tb-itunes').className = 'type-btn' + (t === 'itunes' ? ' sel' : '');
    }

    function toggleFormStatus() {
      const inp = document.getElementById('f-status');
      const btn = document.getElementById('f-status-btn');
      const now = inp.value === 'true';

      inp.value = !now;
      btn.className = 'btn-toggle ' + (!now ? 'used' : 'active');
      btn.textContent = !now ? '✗ Використано' : '✓ Активний';
    }

    async function saveAccForm() {
  const accType = document.getElementById('f-type').value;
  const isEdit = editId !== null;

  await postApi({
    type: 'account',
    action: isEdit ? 'update' : 'add',
    row: editId,
    accType,
    login: document.getElementById('f-login').value.trim(),
    password: document.getElementById('f-pass').value.trim(),
    link: accType === 'itunes' ? document.getElementById('f-link').value.trim() : '',
    balance: document.getElementById('f-balance').value.trim(),
    rate: document.getElementById('f-rate').value.trim(),
    note: document.getElementById('f-note').value.trim(),
    twofa: accType === 'xbox' ? document.getElementById('f-twofa').value.trim() : ''
  });

  toast(isEdit ? 'Акаунт оновлено' : 'Акаунт додано', 'ok');
  closeModal();
  setTimeout(loadData, 1000);
}

    async function saveCdkForm() {
  const isEdit = editId !== null;
  const category = document.getElementById('f-category').value;
  const used = document.getElementById('f-status').value === 'true' ? 'TRUE' : 'FALSE';
  const note = document.getElementById('f-note').value;

  if (!isEdit) {
    const raw = document.getElementById('f-bulk-codes').value;

    const codes = raw
  .match(/[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}/g)
  ?.map(x => x.trim().toUpperCase()) || [];

if (!codes.length) {
  await showConfirm(
    'CDK не знайдено',
    'Встав коди формату <b>67c72481-378f-49ae-a6b1-9cbb9236e280</b>'
  );
  return;
}

const uniqueCodes = [...new Set(codes)];
const existingCodes = cdks.map(x => String(x.code || '').toUpperCase());
const filteredCodes = uniqueCodes.filter(code => !existingCodes.includes(code));

if (!filteredCodes.length) {
  await showConfirm(
    'Дублікати',
    'Усі ці CDK вже є в таблиці. Нових кодів для додавання немає.'
  );
  return;
}

    const ok = await showConfirm(
  'Додати CDK коди?',
  `Ти додаєш <b>${filteredCodes.length}</b> CDK у категорію <b>${category}</b>.<br>Продовжити?`,
  'add'
);

if (!ok) return;

    await postApi({
      type: 'cdk',
      action: 'bulkAdd',
      category,
      label: category,
      used,
      note,
      codes: filteredCodes
    });

        toast('CDK додано', 'ok');
    closeModal();
    setTimeout(loadData, 1000);
    return;

  } else {
    await postApi({
      type: 'cdk',
      action: 'update',
      row: editId,
      label: category,
      code: document.getElementById('f-code').value,
      used,
      note,
      category
    });

    toast('CDK оновлено', 'ok');
  }

  closeModal();
  setTimeout(loadData, 1000);
}

    function togglePw(id, btn) {
      const inp = document.getElementById(id);
      inp.type = inp.type === 'password' ? 'text' : 'password';
      btn.innerHTML = inp.type === 'password' ? '👁' : '🙈';
    }

    function catIcon(cat) {
  const files = {
    Spotify: ['spotify.png', 'spotify'],
    Claude: ['claude.png', 'claude'],
    ChatGPT: ['chatgpt.png', 'chatgpt'],
    Grok: ['grok.png', 'grok']
  };

  const item = files[cat];
  if (!item) return '🔑';

  return `<img src="${item[0]}" class="cat-icon ${item[1]}" alt="${cat}">`;
}

      return String(s || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

  </svg>
`;

const eyeOffIcon = `
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M3 3l18 18"></path>
    <path d="M10.6 10.6a2 2 0 0 0 2.8 2.8"></path>

    <path d="M6.6 6.6A18.6 18.6 0 0 0 1 12s4 8 11 8a10.9 10.9 0 0 0 4.7-1"></path>
  </svg>
`;

    const svgEdit = `
      <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
    `;

    const svgTrash = `
      <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
        <path d="M10 11v6M14 11v6M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
      </svg>
    `;
  window.addEventListener('load', () => {
  const savedRole = localStorage.getItem('managerRole');

  if (savedRole === 'admin') {
    isAdmin = true;
    startApp();
  }

  if (savedRole === 'worker') {
    isAdmin = false;
    startApp();
  }
});
  </script>

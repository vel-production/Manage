<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PixelDrop Vault</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    .worker-login {
  display: grid;
  gap: 10px;
  margin-top: 14px;
}

.worker-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 11px 12px;
  color: var(--text);
  font-size: 14px;
  outline: none;
}

.worker-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px #6366f122;
}
    :root {
      --bg: #07090f;
      --surface: #0d1117;
      --surface2: #111827;
      --border: #ffffff0f;
      --border2: #ffffff18;
      --text: #e2e8f0;
      --muted: #6b7280;
      --muted2: #374151;
      --accent: #6366f1;
      --accent2: #8b5cf6;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --mono: 'Inter', sans-serif;
      --body: 'Inter', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 15px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--body);
      min-height: 100vh;
    }

    button {
      cursor: pointer;
      font-family: var(--body);
      transition: opacity .15s, background .15s, border-color .15s;
    }

    button:active {
      opacity: .75;
    }

    input,
    textarea,
    select {
      font-family: var(--body);
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: transparent;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }

    .logo-icon img,
    .login-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .login-avatar {
      width: 72px;
      height: 72px;
      border-radius: 22px;
      margin: 0 auto;
      overflow: hidden;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: 1px solid var(--border2);
    }

    .logo-title {
      font-family: var(--body);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.2px;
      color: var(--text);
    }

    .logo-sub {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--mono);
      margin-top: 1px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .role-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 20px;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      border: 1px solid;
    }

    .role-badge.admin {
  position: relative;
  overflow: hidden;
  background: linear-gradient(135deg, #312e81, #4c1d95, #6d28d9);
  border-color: #8b5cf680;
  color: #ede9fe;
  box-shadow:
    0 0 18px #8b5cf655,
    inset 0 0 18px #ffffff12;
  animation: adminPulse 2.4s ease-in-out infinite;
}

.role-badge.admin::before {
  content: "";
  position: absolute;
  top: 0;
  left: -80%;
  width: 60%;
  height: 100%;
  background: linear-gradient(90deg, transparent, #ffffff45, transparent);
  transform: skewX(-20deg);
  animation: adminShine 3s infinite;
}

@keyframes adminPulse {
  0%, 100% {
    box-shadow: 0 0 14px #8b5cf655, inset 0 0 18px #ffffff12;
  }
  50% {
    box-shadow: 0 0 28px #8b5cf6aa, inset 0 0 22px #ffffff18;
  }
}

@keyframes adminShine {
  0% { left: -80%; }
  45%, 100% { left: 130%; }
}

    .role-badge.worker {
      background: #ffffff08;
      border-color: var(--border2);
      color: var(--muted);
    }

    .btn-ghost {
      background: #ffffff08;
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 6px 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .btn-refresh {
      background: none;
      border: none;
      color: var(--muted2);
      padding: 6px;
      border-radius: 6px;
      font-size: 18px;
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 16px 80px;
    }

    #login-screen {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 36px;
      width: 100%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 32px 80px #0009;
    }

    .login-card h2 {
      font-family: var(--mono);
      font-size: 19px;
      color: var(--text);
      margin: 16px 0 6px;
    }

    .login-card p {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 28px;
    }

    .login-section {
      background: #1f293780;
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 14px;
    }

    .login-section small {
      display: block;
      color: #9ca3af;
      font-size: 12px;
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .pass-wrap {
      position: relative;
      margin-bottom: 12px;
    }

    .pass-wrap input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 10px 40px 10px 12px;
      color: var(--text);
      font-size: 14px;
      letter-spacing: 3px;
      text-align: center;
      outline: none;
    }

    .pass-toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #555;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 8px;
      padding: 11px 20px;
      color: #fff;
      font-size: 14px;
      font-family: var(--mono);
      font-weight: 700;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-worker {
      background: #ffffff08;
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 11px 20px;
      color: var(--muted);
      font-size: 14px;
      width: 100%;
    }

    .err-msg {
      color: #f87171;
      font-size: 12px;
      margin-bottom: 10px;
    }

    .stats,
    .cat-stats {
      display: grid;
      gap: 10px;
      margin-bottom: 14px;
    }

    .stats {
      grid-template-columns: repeat(3, 1fr);
    }

    .cat-stats {
      grid-template-columns: repeat(4, 1fr);
      margin-bottom: 22px;
    }

    .stat-card,
    .cat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
    }

    .cat-card {
      cursor: pointer;
    }
    
    .cat-card {
      transition: 0.2s;
    }
    
    .cat-card.active {
      border: 1px solid #8b5cf6;
      box-shadow: 0 0 25px #8b5cf660;
    }

    .cat-card.active {
      border: 1px solid #8b5cf6;
      box-shadow: 0 0 25px #8b5cf660;
    }
    .cat-card.active {
      border-color: #6366f150;
      background: #6366f112;
    }

    .stat-val,
    .cat-num {
      font-family: var(--mono);
      font-size: 26px;
      font-weight: 700;
    }

    .cat-num {
      font-size: 18px;
    }

    .stat-lbl,
    .cat-row {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
    }

    .cat-name {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .cat-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .tab-btn {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
    }

    .tab-btn.active {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-color: transparent;
      color: #fff;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
      align-items: center;
    }

    .search-wrap {
      flex: 1;
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px 10px 12px;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }

    .btn-add {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      color: #fff;
      font-family: var(--mono);
      font-weight: 700;
      font-size: 13px;
      white-space: nowrap;
    }

    .chips {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .chip {
      padding: 5px 13px;
      border-radius: 20px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-family: var(--mono);
    }

    .chip.active {
      border-color: var(--accent);
      background: #6366f118;
      color: #a5b4fc;
    }

    .sync-info {
      text-align: right;
      font-size: 11px;
      color: var(--muted2);
      font-family: var(--mono);
      margin-bottom: 16px;
    }

    .cards {
      display: grid;
      gap: 12px;
    }

    .empty {
      text-align: center;
      color: var(--muted2);
      padding: 48px 0;
      font-family: var(--mono);
      font-size: 13px;
    }

    .acc-card,
    .cdk-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
    }

    .cdk-card.active {
      border: 2px solid #22c55e30;
    }

    .cdk-card.used {
      border: 2px solid #ef444428;
      opacity: .65;
    }

    .card-head,
    .cdk-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .type-badge,
    .category-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 8px;
      font-family: var(--mono);
      font-size: 12px;
      background: #6366f118;
      color: #a5b4fc;
    }

    .cat-img {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      object-fit: cover;
      vertical-align: middle;
      margin-right: 8px;
    }

    .type-xbox {
      background: #107c1018;
      color: #86efac;
    }

    .type-itunes {
      background: #fc3c4418;
      color: #fda4af;
    }

    .price-badge {
      background: #f59e0b15;
      color: #fbbf24;
      border-radius: 8px;
      padding: 3px 10px;
      font-family: var(--mono);
      font-size: 12px;
    }

    .card-actions,
    .cdk-controls {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn-icon {
      border-radius: 6px;
      padding: 5px 7px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-edit {
      background: #ffffff08;
      border: 1px solid var(--border2);
      color: var(--muted);
    }

    .btn-del {
      background: #ef444410;
      border: 1px solid #ef444430;
      color: #f87171;
    }

    .card-fields {
      display: grid;
      gap: 10px;
    }

    .field-row {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .field-key {
      color: #4b5563;
      font-size: 11px;
      width: 48px;
      font-family: var(--mono);
      flex-shrink: 0;
    }

    .field-val {
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .field-val.pass {
      letter-spacing: 4px;
    }

    .field-val.pass.show {
      letter-spacing: 1px;
    }

    .field-note {
      background: #ffffff05;
      border-radius: 8px;
      padding: 7px 10px;
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
    }

    .cdk-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 14px;
      color: var(--text);
      flex-wrap: wrap;
    }

    .btn-toggle {
      padding: 4px 13px;
      border-radius: 20px;
      border: none;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
    }

    .btn-toggle.active {
      background: #22c55e18;
      color: #4ade80;
    }

    .btn-toggle.used {
      background: #ef444418;
      color: #f87171;
    }

    .cdk-code-box {
      background: #060a10;
      border-radius: 10px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .cdk-code {
      font-family: var(--mono);
      font-size: 15px;
      letter-spacing: 3px;
      flex: 1;
      overflow-wrap: anywhere;
    }

    .cdk-code.active {
      color: #c4b5fd;
    }

    .cdk-code.masked {
      color: #4b5563;
    }

    

   .btn-copy {
  background: #ffffff10;
  border: 1px solid #ffffff22;
  border-radius: 10px;
  padding: 9px 13px;
  color: #e5e7eb;
  font-size: 13px;
  font-weight: 700;
}

.btn-copy.ok {
  background: #22c55e18;
  border-color: #22c55e55;
  color: #4ade80;
}

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: #000c;
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .modal-box {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 18px;
      padding: 28px;
      width: 100%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 24px 80px #0009;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .modal-title {
      font-family: var(--mono);
      font-size: 17px;
      color: var(--text);
    }

    .btn-close {
      background: none;
      border: none;
      color: #666;
      padding: 4px;
      font-size: 18px;
    }

    .form-field {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      margin-bottom: 6px;
      font-size: 11px;
      color: var(--muted);
      font-family: var(--mono);
      text-transform: none;
      letter-spacing: 1px;
    }

    .form-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }

    textarea.form-input {
      resize: vertical;
      min-height: 56px;
    }

    .form-input.code-inp {
      font-family: var(--mono);
      letter-spacing: 2px;
      font-size: 13px;
    }

    .pass-field {
      position: relative;
    }

    .pass-field .form-input {
      padding-right: 40px;
    }

    .pass-field .pass-toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #555;
    }

    .type-btns {
      display: flex;
      gap: 8px;
    }

    .type-btn {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 2px solid var(--border2);
      background: transparent;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 13px;
    }

    .type-btn.sel {
      border-color: var(--accent);
      background: #6366f118;
      color: #a5b4fc;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .form-footer {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 4px;
    }

    .btn-cancel {
      background: #ffffff08;
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 10px 20px;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 720px) {
      .stats,
      .cat-stats {
        grid-template-columns: 1fr 1fr;
      }

      .toolbar {
        flex-direction: column;
        align-items: stretch;
      }
    }
    .cat-icon {
  width: 48px;
  height: 48px;
  border-radius: 14px;
  object-fit: contain;
  margin-right: 12px;
}

.cat-icon.spotify { filter: drop-shadow(0 0 14px #22c55e88); }
.cat-icon.claude { filter: drop-shadow(0 0 14px #fb7a4388); }
.cat-icon.chatgpt { filter: drop-shadow(0 0 14px #10b98188); }
.cat-icon.grok {
  filter: invert(1) brightness(1.7) drop-shadow(0 0 14px #8b5cf688);
}
    .actions-bar {
  display: flex;
  gap: 10px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}

.btn-danger {
  background: linear-gradient(135deg, #ef4444, #dc2626);
  border: none;
  border-radius: 10px;
  padding: 10px 14px;
  color: white;
  font-weight: 700;
}

.btn-secondary {
  background: #ffffff10;
  border: 1px solid #ffffff20;
  border-radius: 10px;
  padding: 10px 14px;
  color: #ddd;
  font-weight: 700;
}

.cdk-select {
  appearance: none;
  width: 24px;
  height: 24px;
  border: 2px solid #8b5cf6;
  border-radius: 6px;
  background: #111827;
  box-shadow: 0 0 12px #8b5cf655;
  cursor: pointer;
  display: grid;
  place-items: center;
}

.cdk-select:checked {
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  border-color: #a78bfa;
}

.cdk-select:checked::after {
  content: "✓";
  color: white;
  font-weight: 800;
  font-size: 15px;
}
   .chip {
  padding: 10px 18px;
  border-radius: 14px;
  font-size: 14px;
  font-weight: 700;
}

.chip-all.active {
  border-color: #8b5cf6;
  background: #8b5cf622;
  color: #c4b5fd;
}

.chip-active {
  border-color: #22c55e44;
  color: #4ade80;
}

.chip-active.active {
  background: #22c55e18;
}

.chip-used {
  border-color: #ef444444;
  color: #f87171;
}

.chip-used.active {
  background: #ef444418;
}

.chip-today {
  border-color: #f59e0b66;
  color: #facc15;
  background: #f59e0b12;
}

.tab-btn.active,
.btn-add,
.btn-primary {
  background: linear-gradient(135deg, #5b5ff5, #7c3aed);
} 
  .confirm-box {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 18px;
  padding: 24px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 24px 80px #000b;
}

.confirm-title {
  font-size: 20px;
  font-weight: 800;
  margin-bottom: 10px;
}

.confirm-text {
  color: #94a3b8;
  line-height: 1.5;
  margin-bottom: 20px;
}

.confirm-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}  
 #toast {
  position: fixed;
  right: 20px;
  top: 90px;
  z-index: 2000;
  display: grid;
  gap: 10px;
}

.toast-msg {
  background: #111827;
  border: 1px solid #ffffff20;
  color: #e5e7eb;
  padding: 12px 16px;
  border-radius: 14px;
  font-weight: 700;
  box-shadow: 0 20px 60px #0008;

    function parseCSV(text) {
      const clean = text.trim();
      if (!clean) return [];

      const lines = clean.split('\n');
      if (lines.length < 2) return [];

      const headers = parseLine(lines[0]);

      return lines.slice(1).map(line => {
        const vals = parseLine(line);
        const obj = {};

        headers.forEach((h, i) => {
          obj[h.trim()] = (vals[i] || '').trim();
        });

        return obj;
      }).filter(r => Object.values(r).some(v => v));
    }

    function parseLine(line) {
      const result = [];
      let cur = '';
      let inQ = false;

      for (let i = 0; i < line.length; i++) {
        const c = line[i];

        if (c === '"') {
          if (inQ && line[i + 1] === '"') {
            cur += '"';
            i++;
          } else {
            inQ = !inQ;
          }
        } else if (c === ',' && !inQ) {
          result.push(cur);
          cur = '';
        } else {
          cur += c;
        }
      }

      result.push(cur);
      return result;
    }

    async function loadData() {
      try {
        const [rA, rC, rS] = await Promise.all([
          fetch(csvAcc + '&t=' + Date.now()),
          fetch(csvCdk + '&t=' + Date.now()),
          fetch(csvStats + '&t=' + Date.now())
        ]);

        accounts = parseCSV(await rA.text()).map((a, i) => ({
          ...a,
          _id: i
        }));

        cdks = parseCSV(await rC.text()).map((c, i) => ({
  ...c,
  _id: i,
  _used: (c.used || "").toLowerCase() === "true" || c.used === "1",
  category: c.category || "Spotify",
  note: String(c.note || "").toLowerCase() === "false" ? "" : (c.note || ""),
  used_at: c.used_at || "",
  used_by: c.used_by || ""
}));

        statsRows = parseCSV(await rS.text());

        updateStats();
        render();
        renderCategoryStats();

        document.getElementById('sync-info').textContent =
          '↻ ' + new Date().toLocaleTimeString('uk-UA') + ' · авто-оновлення 15с';
      } catch (e) {
        document.getElementById('sync-info').textContent =
          '⚠ Помилка завантаження — перевір налаштування таблиці';
      }
    }

    function getUsedTotal(category) {
      const row = statsRows.find(s => s.category === category);
      return Number(row?.used_count || 0);
    }

    function updateStats() {
      document.getElementById('s-acc').textContent = accounts.length;

      const active = cdks.filter(c => !c._used).length;
      document.getElementById('s-active').textContent = active;

      const usedTotal = CATEGORIES.reduce((sum, c) => sum + getUsedTotal(c), 0);
      document.getElementById('s-used-total').textContent = usedTotal;
    }

    function renderCategoryStats() {
      const wrap = document.getElementById('cat-stats');

      wrap.innerHTML = CATEGORIES.map(cat => {
        const active = cdks.filter(c => !c._used && c.category === cat).length;

        return `

            <div class="cat-name">${catIcon(cat)} ${cat}</div>

              </div>

              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function setCategory(cat) {

  if (!c.used_at) return false;

          if (filterCategory !== 'all' && c.category !== filterCategory) return false;

  const today = new Date().toISOString().slice(0, 10);

}

`;
      
      const usedBy = c._used && c.used_by
      ? `<div class="field-note" style="margin-top:10px;color:#facc15">👤 Використав: ${esc(c.used_by)}</div>`
      : "";

      const workerToggle = `
        <button class="btn-toggle ${c._used ? 'used' : 'active'}" onclick="workerToggleCdk(${c._id})">
          ${c._used ? '✗ Використано' : '✓ Активний'}
        </button>
      `;

      const codeDisplay = c._used
        ? `
          <span class="cdk-code masked" id="cc-${c._id}">${'•'.repeat((c.code || '').length)}</span>
          <button class="btn-reveal" onclick="revealCdk(${c._id},'${esc(c.code)}')">👁</button>
        `
        : `
          <span class="cdk-code active">${esc(c.code)}</span>
          ${copyBtn(c.code)}
        `;

      return `
        <div class="cdk-card ${c._used ? 'used' : 'active'}">
          <div class="cdk-head">
            <div class="cdk-title">
              ${isAdmin ? `<input type="checkbox" class="cdk-select" ${selected.has(c._id) ? 'checked' : ''} onclick="event.stopPropagation();toggleSelect(${c._id})">` : ''}
              ${catIcon(c.category)}
              ${esc(c.category || 'CDK')}
      
            </div>

            <div class="cdk-controls">
              ${workerToggle}
              ${adminBtns}
            </div>
          </div>

          <div class="cdk-code-box">
            ${codeDisplay}
          </div>

          ${usedBy}

          ${c.note && String(c.note).toLowerCase() !== 'false'
          ? `<div class="field-note" style="margin-top:10px">${esc(c.note)}</div>`
          : ''}
        </div>
      `;
    }

    function revealCdk(id, code) {
      const el = document.getElementById('cc-' + id);
      if (!el) return;

      el.textContent = el.textContent.includes('•')
        ? code
        : '•'.repeat(code.length);
    }

    async function postApi(payload) {
  await fetch(API_URL, {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify({
      ...payload,
      user: currentUser || localStorage.getItem("workerName") || "Unknown"
    })
  });
}

    async function workerToggleCdk(id) {
  const c = cdks[id];
  if (!c) return;

  const newStatus = !c._used;

  await postApi({
    type: "cdk",
    action: "toggle",
    row: id,
    used: newStatus ? "TRUE" : "FALSE"
  });

  setTimeout(loadData, 1000);
}

    async function deleteCdk(id) {
  const ok = await showConfirm(
    'Видалити CDK?',
    'Цей код буде видалено. Перед цим буде створена резервна копія.'
  );

  if (!ok) return;

  await postApi({
    type: 'cdk',
    action: 'delete',
    row: id
  });

  toast('CDK видалено', 'ok');
  setTimeout(loadData, 1000);
}

    let copyTimers = {};

    function copyText(text, btnEl) {
      navigator.clipboard.writeText(text).then(() => {
        btnEl.innerHTML = '✓ OK';
        btnEl.classList.add('ok');

        clearTimeout(copyTimers[text]);

        copyTimers[text] = setTimeout(() => {
          btnEl.innerHTML = '▣ Копіювати';
          btnEl.classList.remove('ok');
        }, 1400);
      });
    }

    function copyBtn(text) {
      return `<button class="btn-copy" onclick="copyText('${esc(text)}',this)">▣ Копіювати</button>`;
    }

    function openAddModal() {
      editId = null;

      document.getElementById('modal-title').textContent =
        currentTab === 'accounts' ? 'Новий акаунт' : 'Новий CDK';

      document.getElementById('modal-body').innerHTML =
        currentTab === 'accounts' ? accForm(null) : cdkForm(null);

      document.getElementById('modal').style.display = 'flex';
    }

    function openEditAcc(id) {
      editId = id;
      document.getElementById('modal-title').textContent = 'Редагувати акаунт';
      document.getElementById('modal-body').innerHTML = accForm(accounts[id]);
      document.getElementById('modal').style.display = 'flex';
    }

    function openEditCdk(id) {
      editId = id;
      document.getElementById('modal-title').textContent = 'Редагувати CDK';
      document.getElementById('modal-body').innerHTML = cdkForm(cdks[id]);
      document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
    }

    function accForm(a) {
      const t = a ? (a.type || 'xbox').toLowerCase() : 'xbox';

      return `
        <div>
          <div class="form-field">
            <label class="form-label">Тип</label>

            <div class="type-btns">
              <button class="type-btn${t === 'xbox' ? ' sel' : ''}" id="tb-xbox" onclick="selType('xbox')">🎮 Xbox</button>
              <button class="type-btn${t === 'itunes' ? ' sel' : ''}" id="tb-itunes" onclick="selType('itunes')">🍎 iTunes</button>
            </div>

            <input type="hidden" id="f-type" value="${t}">
          </div>

          <div class="form-field">
            <label class="form-label">Логін / Email</label>
            <input class="form-input" id="f-login" value="${esc(a?.login || '')}">
          </div>

          <div class="form-field">
            <label class="form-label">Пароль</label>

            <div class="pass-field">
              <input class="form-input" type="password" id="f-pass" value="${esc(a?.password || '')}">
              <button class="pass-toggle" onclick="togglePw('f-pass',this)">👁</button>
            </div>
          </div>

          <div class="form-field">
            <label class="form-label">Посилання</label>
            <input class="form-input" id="f-link" value="${esc(a?.link || '')}">
          </div>

          <div class="form-field">
            <label class="form-label">Телефон / 2FA</label>
            <input class="form-input" id="f-phone" value="${esc(a?.phone_code || '')}">
          </div>

          <div class="form-field">
            <label class="form-label">Ціна</label>
            <input class="form-input" id="f-rate" value="${esc(a?.rate || '')}">
          </div>

          <div class="form-field">
            <label class="form-label">Нотатка</label>
            <textarea class="form-input" id="f-note">${esc(a?.note || '')}</textarea>
          </div>

          <div class="form-field" style="background:#f59e0b10;border:1px solid #f59e0b30;border-radius:10px;padding:12px;font-size:12px;color:#fbbf24">
            💡 Акаунти поки додаються через копіювання рядка в Google Таблицю.
          </div>

          <div class="form-footer">
            <button class="btn-cancel" onclick="closeModal()">Скасувати</button>
            <button class="btn-primary" style="width:auto" onclick="saveAccForm()">Зберегти</button>
          </div>
        </div>
      `;
    }

function cdkForm(c) {
  const used = c ? c._used : false;
  const cat = c?.category || (filterCategory !== 'all' ? filterCategory : 'Spotify');

  return `
    <div>
      <div class="form-field">
        <label class="form-label">Категорія</label>
        <select class="form-input" id="f-category">
          ${CATEGORIES.map(x => `
            <option value="${x}" ${cat === x ? 'selected' : ''}>${x}</option>
          `).join('')}
        </select>
      </div>

      <div class="form-field">
        <label class="form-label">CDK Код</label>

        ${c ? `
          <input
            class="form-input code-inp"
            id="f-code"
            value="${esc(c?.code || '')}"
            oninput="this.value=this.value.toUpperCase()"
          >
        ` : `
          <textarea
            class="form-input code-inp"
            id="f-bulk-codes"
            style="min-height:180px;letter-spacing:1px;"
            placeholder="Встав один або багато CDK кодів сюди"
          ></textarea>
        `}
      </div>

      <div class="status-row">
        <span class="form-label" style="margin:0">Статус:</span>

        <button
          class="btn-toggle ${used ? 'used' : 'active'}"
          id="f-status-btn"
          onclick="toggleFormStatus()"
        >
          ${used ? '✗ Використано' : '✓ Активний'}
        </button>

        <input type="hidden" id="f-status" value="${used}">
      </div>

      <div class="form-field">
        <label class="form-label">Нотатка</label>
        <textarea class="form-input" id="f-note">${esc(c?.note || '')}</textarea>
      </div>

      <div class="form-footer">
        <button class="btn-cancel" onclick="closeModal()">Скасувати</button>
        <button class="btn-primary" style="width:auto" onclick="saveCdkForm()">Зберегти</button>
      </div>
    </div>
  `;
}

    function selType(t) {
      document.getElementById('f-type').value = t;
      document.getElementById('tb-xbox').className = 'type-btn' + (t === 'xbox' ? ' sel' : '');
      document.getElementById('tb-itunes').className = 'type-btn' + (t === 'itunes' ? ' sel' : '');
    }

    function toggleFormStatus() {
      const inp = document.getElementById('f-status');
      const btn = document.getElementById('f-status-btn');
      const now = inp.value === 'true';

      inp.value = !now;
      btn.className = 'btn-toggle ' + (!now ? 'used' : 'active');
      btn.textContent = !now ? '✗ Використано' : '✓ Активний';
    }

    function saveAccForm() {
      const data = {
        type: document.getElementById('f-type').value,
        login: document.getElementById('f-login').value,
        password: document.getElementById('f-pass').value,
        link: document.getElementById('f-link').value,
        phone_code: document.getElementById('f-phone').value,
        rate: document.getElementById('f-rate').value,
        note: document.getElementById('f-note').value
      };

      prompt(
        'Скопіюй рядок для таблиці Accounts (Ctrl+C):',
        `${data.type}\t${data.login}\t${data.password}\t${data.link}\t${data.phone_code}\t${data.rate}\t${data.note}`
      );

      closeModal();
    }

    async function saveCdkForm() {
  const isEdit = editId !== null;
  const category = document.getElementById('f-category').value;
  const used = document.getElementById('f-status').value === 'true' ? 'TRUE' : 'FALSE';
  const note = document.getElementById('f-note').value;

  if (!isEdit) {
    const raw = document.getElementById('f-bulk-codes').value;

    const codes = raw
  .match(/[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}/g)
  ?.map(x => x.trim().toUpperCase()) || [];

if (!codes.length) {
  await showConfirm(
    'CDK не знайдено',
    'Встав коди формату <b>67c72481-378f-49ae-a6b1-9cbb9236e280</b>'
  );
  return;
}

const uniqueCodes = [...new Set(codes)];
const existingCodes = cdks.map(x => String(x.code || '').toUpperCase());
const filteredCodes = uniqueCodes.filter(code => !existingCodes.includes(code));

if (!filteredCodes.length) {
  await showConfirm(
    'Дублікати',
    'Усі ці CDK вже є в таблиці. Нових кодів для додавання немає.'
  );
  return;
}

    const ok = await showConfirm(
  'Додати CDK коди?',
  `Ти додаєш <b>${filteredCodes.length}</b> CDK у категорію <b>${category}</b>.<br>Продовжити?`,
  'add'
);

if (!ok) return;

    await postApi({
      type: 'cdk',
      action: 'bulkAdd',
      category,
      label: category,
      used,
      note,
      codes: filteredCodes
    });

        toast('CDK додано', 'ok');
    closeModal();
    setTimeout(loadData, 1000);
    return;

  } else {
    await postApi({
      type: 'cdk',
      action: 'update',
      row: editId,
      label: category,
      code: document.getElementById('f-code').value,
      used,
      note,
      category
    });

    toast('CDK оновлено', 'ok');
  }

  closeModal();
  setTimeout(loadData, 1000);
}

    function togglePw(id, btn) {
      const inp = document.getElementById(id);
      inp.type = inp.type === 'password' ? 'text' : 'password';
      btn.innerHTML = inp.type === 'password' ? '👁' : '🙈';
    }

    function catIcon(cat) {
  const files = {
    Spotify: ['spotify.png', 'spotify'],
    Claude: ['claude.png', 'claude'],
    ChatGPT: ['chatgpt.png', 'chatgpt'],
    Grok: ['grok.png', 'grok']
  };

  const item = files[cat];
  if (!item) return '🔑';

  return `<img src="${item[0]}" class="cat-icon ${item[1]}" alt="${cat}">`;
}

    function esc(s) {
      return String(s || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    const svgEdit = `
      <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
    `;

    const svgTrash = `
      <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
        <path d="M10 11v6M14 11v6M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
      </svg>
    `;
  window.addEventListener('load', () => {
  const savedRole = localStorage.getItem('managerRole');

  if (savedRole === 'admin') {
    isAdmin = true;
    startApp();
  }

  if (savedRole === 'worker') {
    isAdmin = false;
    startApp();
  }
});
  </script>
</body>
</html>

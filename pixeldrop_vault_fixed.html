    .header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}.role-badge{display:flex;align-items:center;gap:6px;padding:6px 13px;border-radius:999px;font-size:12px;font-weight:800;border:1px solid}.role-badge.admin{position:relative;overflow:hidden;background:linear-gradient(135deg,#312e81,#4c1d95,#6d28d9);border-color:#8b5cf680;color:#ede9fe;box-shadow:0 0 18px #8b5cf655,inset 0 0 18px #ffffff12;animation:adminPulse 2.4s ease-in-out infinite}.role-badge.admin:before{content:"";position:absolute;top:0;left:-80%;width:60%;height:100%;background:linear-gradient(90deg,transparent,#ffffff45,transparent);transform:skewX(-20deg);animation:adminShine 3s infinite}.role-badge.worker{background:#ffffff08;border-color:var(--border2);color:#cbd5e1}@keyframes adminPulse{0%,100%{box-shadow:0 0 14px #8b5cf655,inset 0 0 18px #ffffff12}50%{box-shadow:0 0 28px #8b5cf6aa,inset 0 0 22px #ffffff18}}@keyframes adminShine{0%{left:-80%}45%,100%{left:130%}}
    .btn-ghost,.btn-refresh{background:#ffffff08;border:1px solid var(--border2);border-radius:10px;color:#cbd5e1}.btn-ghost{padding:7px 13px;font-size:13px}.btn-refresh{padding:7px 10px;font-size:17px}main{max-width:1100px;margin:0 auto;padding:24px 16px 80px}#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}.login-card{background:linear-gradient(180deg,#111827,#0b1220);border:1px solid var(--border2);border-radius:24px;padding:34px;width:100%;max-width:410px;text-align:center;box-shadow:0 32px 100px #000b}.login-card h2{font-size:21px;margin:16px 0 6px;font-weight:800}.login-card p{color:var(--muted);font-size:13px;margin-bottom:24px}.login-section,.worker-login{background:#1f293780;border:1px solid #ffffff0d;border-radius:16px;padding:18px;margin-bottom:14px}.login-section small{display:block;color:#cbd5e1;font-size:12px;margin-bottom:12px}.pass-wrap{position:relative;margin-bottom:12px}.pass-wrap input,.worker-input{width:100%;background:#07090f;border:1px solid var(--border2);border-radius:10px;padding:11px 42px 11px 12px;color:var(--text);font-size:14px;outline:none}.worker-login{display:grid;gap:10px;margin-top:14px}.worker-input{padding-right:12px}.pass-wrap input:focus,.worker-input:focus,.form-input:focus,.search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px #6366f122}.pass-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:#94a3b8}.err-msg{display:none;color:#f87171;font-size:12px;margin-bottom:10px}.btn-primary,.btn-worker,.btn-add{border:none;border-radius:10px;padding:11px 18px;color:white;font-weight:800}.btn-primary,.btn-add{background:linear-gradient(135deg,#5b5ff5,#7c3aed)}.btn-primary,.btn-worker{width:100%}.btn-worker{background:#ffffff08;border:1px solid var(--border2);color:#cbd5e1}

    .card-fields{display:grid;gap:10px}.field-row{display:flex;align-items:center;gap:10px;min-width:0}.field-key{color:#64748b;font-size:11px;width:50px;font-weight:800;flex-shrink:0}.field-val{color:var(--text);font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.field-val.pass{letter-spacing:4px}.field-val.pass.show{letter-spacing:1px}.field-note{background:#ffffff06;border:1px solid #ffffff08;border-radius:10px;padding:8px 11px;margin-top:8px;font-size:12px;color:#cbd5e1}.cdk-title{display:flex;align-items:center;gap:10px;font-weight:800;flex-wrap:wrap}.btn-toggle{padding:5px 14px;border-radius:999px;border:none;font-size:12px;font-weight:800}.btn-toggle.active{background:#22c55e18;color:#4ade80}.btn-toggle.used{background:#ef444418;color:#f87171}.cdk-code-box{background:#050913;border:1px solid #ffffff08;border-radius:13px;padding:13px 16px;display:flex;align-items:center;gap:10px}.cdk-code{font-size:15px;letter-spacing:3px;flex:1;overflow-wrap:anywhere}.cdk-code.active{color:#ddd6fe}.cdk-code.masked{color:#64748b}.btn-copy,.btn-reveal{background:#ffffff10;border:1px solid #ffffff22;border-radius:10px;padding:9px 13px;color:#e5e7eb;font-size:13px;font-weight:800}.btn-copy.ok{background:#22c55e18;border-color:#22c55e55;color:#4ade80}.cdk-select{appearance:none;width:24px;height:24px;border:2px solid #8b5cf6;border-radius:7px;background:#111827;box-shadow:0 0 12px #8b5cf655;cursor:pointer;display:grid;place-items:center}.cdk-select:checked{background:linear-gradient(135deg,#6366f1,#8b5cf6);border-color:#a78bfa}.cdk-select:checked:after{content:"✓";color:white;font-weight:800;font-size:15px}
    .modal-overlay{position:fixed;inset:0;background:#000c;z-index:999;display:flex;align-items:center;justify-content:center;padding:16px}.modal-box{background:linear-gradient(180deg,#111827,#0b1220);border:1px solid var(--border2);border-radius:22px;padding:26px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 90px #000b}.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}.modal-title{font-size:18px;font-weight:800}.btn-close{background:none;border:none;color:#94a3b8;padding:4px;font-size:20px}.form-field{margin-bottom:15px}.form-label{display:block;margin-bottom:7px;font-size:11px;color:var(--muted);font-weight:800;letter-spacing:.5px}.form-input{width:100%;background:#07090f;border:1px solid var(--border2);border-radius:10px;padding:11px 12px;color:var(--text);font-size:14px;outline:none}textarea.form-input{resize:vertical;min-height:64px}.form-input.code-inp{letter-spacing:1px}.pass-field{position:relative}.pass-field .form-input{padding-right:42px}.type-btns{display:flex;gap:8px}.type-btn{flex:1;padding:10px;border-radius:10px;border:2px solid var(--border2);background:transparent;color:#cbd5e1;font-weight:800}.type-btn.sel{border-color:var(--accent);background:#6366f118;color:#a5b4fc}.status-row{display:flex;align-items:center;gap:12px;margin-bottom:15px}.form-footer{display:flex;gap:10px;justify-content:flex-end}.btn-cancel{background:#ffffff08;border:1px solid var(--border2);border-radius:10px;padding:10px 20px;color:#cbd5e1}.confirm-box{text-align:center;background:radial-gradient(circle at top,#1f2937,#0b1220 70%);border:1px solid #ffffff18;border-radius:26px;padding:34px 30px 28px;max-width:460px;margin:0 auto}.confirm-add{border-color:#22c55e88;box-shadow:0 0 45px #22c55e35}.confirm-danger{border-color:#ef444488;box-shadow:0 0 45px #ef444435}.confirm-x{position:absolute;top:18px;right:20px;background:none;border:none;color:#94a3b8;font-size:24px}.confirm-icon{width:74px;height:74px;margin:0 auto 18px;border-radius:50%;display:grid;place-items:center;font-size:34px;background:#ffffff10}.confirm-add .confirm-icon{border:2px solid #22c55e;box-shadow:0 0 28px #22c55e66}.confirm-danger .confirm-icon{border:2px solid #ef4444;box-shadow:0 0 28px #ef444466}.confirm-title{font-size:25px;font-weight:800;margin-bottom:12px}.confirm-text{color:#cbd5e1;line-height:1.55;font-size:16px;margin-bottom:24px}.confirm-actions{display:flex;gap:12px;justify-content:center}.btn-confirm-add{background:linear-gradient(135deg,#22c55e,#16a34a);border:none;border-radius:12px;padding:12px 22px;color:white;font-weight:800}#toast{position:fixed;right:20px;top:90px;z-index:2000;display:grid;gap:10px}.toast-msg{background:#111827;border:1px solid #ffffff20;color:#e5e7eb;padding:12px 16px;border-radius:14px;font-weight:800;box-shadow:0 20px 60px #0008;animation:toastIn .25s ease}.toast-msg.ok{border-color:#22c55e66;color:#86efac}.toast-msg.err{border-color:#ef444466;color:#fca5a5}@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}@media(max-width:900px){.cat-stats{grid-template-columns:repeat(2,1fr)}.stats{grid-template-columns:1fr 1fr 1fr}}@media(max-width:620px){main{padding:18px 12px 60px}.header-inner{align-items:flex-start}.stats,.cat-stats{grid-template-columns:1fr}.toolbar{flex-direction:column;align-items:stretch}.tabs{flex-direction:column}.cat-row{grid-template-columns:repeat(3,1fr)}.cdk-code-box{flex-direction:column;align-items:stretch}.btn-copy,.btn-reveal{width:100%}}
  </style>

<body>
<div id="toast"></div>
<div id="login-screen"><div class="login-card"><div class="login-avatar"><img src="avatar.png" alt="PixelDrop avatar"></div><h2>PIXELDROP VAULT</h2><p>Xbox · iTunes · CDK</p><div class="login-section"><small>Введіть пароль адміна для повного доступу</small><div class="pass-wrap"><input type="password" id="pw-input" placeholder="Пароль адміна" onkeydown="if(event.key==='Enter')tryLogin()"><button class="pass-toggle" onclick="togglePw('pw-input',this)">👁</button></div><div class="err-msg" id="pw-err">Невірний пароль</div><button class="btn-primary" onclick="tryLogin()">Увійти як Адмін</button></div><div class="worker-login"><input class="worker-input" id="worker-name" placeholder="Нік працівника"><input class="worker-input" id="worker-pass" type="password" placeholder="Пароль працівника" onkeydown="if(event.key==='Enter')enterAsWorker()"><button class="btn-worker" onclick="enterAsWorker()">Увійти як працівник</button></div></div></div>
<div id="app" style="display:none"><header><div class="header-inner"><div class="logo"><div class="logo-icon"><img src="avatar.png" alt="PixelDrop avatar"></div><div><div class="logo-title">PixelDrop Vault</div><div class="logo-sub">Xbox · iTunes · CDK</div></div></div><div class="header-right"><button class="btn-refresh" onclick="loadData()" title="Оновити">↻</button><div class="role-badge" id="role-badge"></div><button class="btn-ghost" onclick="logout()">Вийти</button></div></div></header><main><div class="stats"><div class="stat-card"><div class="stat-val" id="s-acc" style="color:#818cf8">0</div><div class="stat-lbl">Акаунти</div></div><div class="stat-card"><div class="stat-val" id="s-active" style="color:#4ade80">0</div><div class="stat-lbl">CDK активні</div></div><div class="stat-card"><div class="stat-val" id="s-used-total" style="color:#f87171">0</div><div class="stat-lbl">Використані всього</div></div></div><div class="cat-stats" id="cat-stats"></div><div class="sync-info" id="sync-info"></div><div class="tabs"><button class="tab-btn active" id="tab-accounts" onclick="switchTab('accounts')">👤 Акаунти</button><button class="tab-btn" id="tab-cdks" onclick="switchTab('cdks')">🔑 CDK Коди</button></div><div class="toolbar"><div class="search-wrap"><input type="text" id="search" placeholder="Пошук..." oninput="render()"></div><button class="btn-add" id="btn-add" onclick="openAddModal()" style="display:none">＋ Додати</button></div><div class="chips" id="chips"></div><div class="actions-bar" id="actions-bar"></div><div class="cards" id="cards"></div></main></div>
<div class="modal-overlay" id="modal" style="display:none" onclick="closeModal()"><div class="modal-box" onclick="event.stopPropagation()"><div class="modal-header"><div class="modal-title" id="modal-title"></div><button class="btn-close" onclick="closeModal()">✕</button></div><div id="modal-body"></div></div></div>
<script>
const SHEET_ID='1-yF9f9LepfGBpg1fyhewTcgT7oePscPEScD9v-8Ggn4';
const API_URL='https://script.google.com/macros/s/AKfycbyqOQMi2TsM0etBULK_utk3cZOPX2ST_g0XJuntZTjOu7dikFpfdXP2jxkfqx5lM22k/exec';
const POLL_MS=15000; const CATEGORIES=['Spotify','Claude','ChatGPT','Grok'];
const csvAcc=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Accounts`;
const csvCdk=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=CDK`;
const csvStats=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Stats`;
let isAdmin=false,accounts=[],cdks=[],statsRows=[],currentTab='accounts',filterType='all',filterUsed='all',filterCategory='all',editId=null,pollTimer=null,selected=new Set(),confirmResolve=null,currentUser='';
function authRequest(login,password){return new Promise(resolve=>{const cb='auth_cb_'+Date.now();const script=document.createElement('script');window[cb]=data=>{delete window[cb];script.remove();resolve(data)};script.src=API_URL+'?callback='+cb+'&login='+encodeURIComponent(login)+'&password='+encodeURIComponent(password);script.onerror=()=>resolve({status:'error'});document.body.appendChild(script)})}
async function tryLogin(){const pw=document.getElementById('pw-input').value;const res=await authRequest('admin',pw);if(res.status==='ok'){localStorage.setItem('managerRole','admin');localStorage.setItem('workerName',res.name||'Admin');isAdmin=true;currentUser=res.name||'Admin';startApp()}else{document.getElementById('pw-err').style.display='block';toast('Невірний пароль адміна','err')}}
async function enterAsWorker(){const name=document.getElementById('worker-name').value.trim();const pass=document.getElementById('worker-pass').value.trim();if(!name)return toast('Введи нік працівника','err');const res=await authRequest(name,pass);if(res.status==='ok'){localStorage.setItem('managerRole','worker');localStorage.setItem('workerName',res.name||name);isAdmin=false;currentUser=res.name||name;startApp()}else toast('Невірний нік або пароль працівника','err')}
function logout(){localStorage.removeItem('managerRole');localStorage.removeItem('workerName');clearInterval(pollTimer);document.getElementById('app').style.display='none';document.getElementById('login-screen').style.display='flex';document.getElementById('pw-input').value='';document.getElementById('worker-pass').value='';document.getElementById('worker-name').value=''}
function startApp(){document.getElementById('login-screen').style.display='none';document.getElementById('app').style.display='block';currentUser=localStorage.getItem('workerName')||(isAdmin?'Admin':'Працівник');const badge=document.getElementById('role-badge');badge.className='role-badge '+(isAdmin?'admin':'worker');badge.innerHTML=isAdmin?`🔐 АДМІН · ${esc(currentUser)}`:`👁 ${esc(currentUser)}`;document.getElementById('btn-add').style.display=isAdmin?'flex':'none';loadData();clearInterval(pollTimer);pollTimer=setInterval(loadData,POLL_MS)}
function parseCSV(text){const clean=text.trim();if(!clean)return[];const lines=clean.split('\n');if(lines.length<2)return[];const headers=parseLine(lines[0]);return lines.slice(1).map(line=>{const vals=parseLine(line),obj={};headers.forEach((h,i)=>obj[h.trim()]=(vals[i]||'').trim());return obj}).filter(r=>Object.values(r).some(v=>v))}
function parseLine(line){const result=[];let cur='',inQ=false;for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++}else inQ=!inQ}else if(c===','&&!inQ){result.push(cur);cur=''}else cur+=c}result.push(cur);return result}
async function loadData(){try{const[rA,rC,rS]=await Promise.all([fetch(csvAcc+'&t='+Date.now()),fetch(csvCdk+'&t='+Date.now()),fetch(csvStats+'&t='+Date.now())]);accounts=parseCSV(await rA.text()).map((a,i)=>({...a,_id:i}));cdks=parseCSV(await rC.text()).map((c,i)=>({...c,_id:i,_used:(c.used||'').toLowerCase()==='true'||c.used==='1',category:c.category||'Spotify',note:String(c.note||'').toLowerCase()==='false'?'':(c.note||''),used_at:c.used_at||'',used_by:c.used_by||''}));statsRows=parseCSV(await rS.text());updateStats();render();renderCategoryStats();document.getElementById('sync-info').textContent='↻ '+new Date().toLocaleTimeString('uk-UA')+' · авто-оновлення 15с'}catch(e){document.getElementById('sync-info').textContent='⚠ Помилка завантаження — перевір доступ до таблиці / Apps Script'}}
function getUsedTotal(category){return statsRows.filter(s=>s.category===category).reduce((sum,s)=>sum+Number(s.used_count||0),0)}
function getUsedToday(category){const today=new Date().toISOString().slice(0,10);return statsRows.filter(s=>String(s.date||'')===today&&s.category===category).reduce((sum,s)=>sum+Number(s.used_count||0),0)}
function updateStats(){document.getElementById('s-acc').textContent=accounts.length;document.getElementById('s-active').textContent=cdks.filter(c=>!c._used).length;document.getElementById('s-used-total').textContent=CATEGORIES.reduce((sum,c)=>sum+getUsedTotal(c),0)}
function renderCategoryStats(){const wrap=document.getElementById('cat-stats');wrap.innerHTML=CATEGORIES.map(cat=>{const active=cdks.filter(c=>!c._used&&c.category===cat).length,usedToday=getUsedToday(cat),usedTotal=getUsedTotal(cat);return `<div class="cat-card ${filterCategory===cat?'active':''}" onclick="setCategory('${cat}')"><div class="cat-name">${catIcon(cat)} <span>${cat}</span></div><div class="cat-row"><div><div>Активні</div><div class="cat-num" style="color:#4ade80">${active}</div></div><div><div>Сьогодні</div><div class="cat-num" style="color:#facc15">${usedToday}</div></div><div><div>Всього</div><div class="cat-num" style="color:#f87171">${usedTotal}</div></div></div></div>`}).join('')}
function setCategory(cat){filterCategory=filterCategory===cat?'all':cat;currentTab='cdks';switchTab('cdks',true);render();renderCategoryStats()}
function switchTab(tab,keepCategory=false){currentTab=tab;document.getElementById('tab-accounts').className='tab-btn'+(tab==='accounts'?' active':'');document.getElementById('tab-cdks').className='tab-btn'+(tab==='cdks'?' active':'');document.getElementById('search').value='';filterType='all';filterUsed='all';if(!keepCategory&&tab!=='cdks')filterCategory='all';render();renderCategoryStats()}
function renderChips(){const c=document.getElementById('chips');if(currentTab==='accounts'){c.innerHTML=['all','xbox','itunes'].map(v=>`<button class="chip${filterType===v?' active':''}" onclick="filterType='${v}';render()">${v==='all'?'Всі':v==='xbox'?'Xbox':'iTunes'}</button>`).join('')}else{c.innerHTML=`<button class="chip chip-all${filterUsed==='all'?' active':''}" onclick="filterUsed='all';render()">Всі</button><button class="chip chip-active${filterUsed==='active'?' active':''}" onclick="filterUsed='active';render()">✓ Активні</button><button class="chip chip-used${filterUsed==='used'?' active':''}" onclick="filterUsed='used';render()">✕ Використані</button><button class="chip chip-today${filterUsed==='today'?' active':''}" onclick="filterUsed='today';render()">▣ Використані сьогодні</button>`}}
function render(){renderChips();renderActions();const q=document.getElementById('search').value.toLowerCase(),el=document.getElementById('cards');if(currentTab==='accounts'){const list=accounts.filter(a=>{if(filterType!=='all'&&(a.type||'').toLowerCase()!==filterType)return false;if(!q)return true;return((a.login||'')+(a.note||'')+(a.rate||'')+(a.type||'')).toLowerCase().includes(q)});el.innerHTML=list.length?list.map(accCard).join(''):'<div class="empty">Акаунтів не знайдено</div>'}else{const list=cdks.filter(c=>{if(filterUsed==='active'&&c._used)return false;if(filterUsed==='used'&&!c._used)return false;if(filterUsed==='today'){if(!c._used||!c.used_at)return false;const today=new Date().toISOString().slice(0,10);if(!String(c.used_at).startsWith(today))return false}if(filterCategory!=='all'&&c.category!==filterCategory)return false;if(!q)return true;return((c.label||'')+(c.code||'')+(c.note||'')+(c.category||'')+(c.used_by||'')).toLowerCase().includes(q)});el.innerHTML=list.length?list.map(cdkCard).join(''):'<div class="empty">Кодів не знайдено</div>'}}
function accCard(a){const xb=(a.type||'').toLowerCase()==='xbox';const adminBtns=isAdmin?`<div class="card-actions"><button class="btn-icon btn-edit" onclick="openEditAcc(${a._id})">${svgEdit}</button><button class="btn-icon btn-del" onclick="toast('Видалення акаунтів поки через таблицю','err')">${svgTrash}</button></div>`:'';const fields=[a.login?`<div class="field-row"><span class="field-key">LOGIN</span><span class="field-val">${esc(a.login)}</span>${copyBtn(a.login)}</div>`:'',a.password?`<div class="field-row"><span class="field-key">PASS</span><span class="field-val pass" id="pv-${a._id}">••••••••••••</span><button class="btn-reveal" onclick="toggleAccPass(${a._id},'${esc(a.password)}')">👁</button>${copyBtn(a.password)}</div>`:'',a.link?`<div class="field-row"><span class="field-key">LINK</span><a href="${esc(a.link)}" target="_blank" class="field-val">${esc(a.link)}</a>${copyBtn(a.link)}</div>`:'',a.phone_code?`<div class="field-row"><span class="field-key">TEL</span><span class="field-val">${esc(a.phone_code)}</span>${copyBtn(a.phone_code)}</div>`:''].filter(Boolean).join('');return `<div class="acc-card"><div class="card-head"><div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center"><span class="type-badge ${xb?'type-xbox':'type-itunes'}">${xb?'🎮 Xbox':'🍎 iTunes'}</span>${a.rate?`<span class="price-badge">💰 ${esc(a.rate)}</span>`:''}</div>${adminBtns}</div><div class="card-fields">${fields}${a.note?`<div class="field-note">${esc(a.note)}</div>`:''}</div></div>`}
function toggleAccPass(id,pw){const el=document.getElementById('pv-'+id);if(!el)return;if(el.classList.contains('show')){el.textContent='••••••••••••';el.classList.remove('show')}else{el.textContent=pw;el.classList.add('show')}}
function renderActions(){const el=document.getElementById('actions-bar');if(!el||!isAdmin||currentTab!=='cdks'){if(el)el.innerHTML='';return}el.innerHTML=`<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;width:100%"><button class="btn-secondary" onclick="deleteSelectedCdks()">🗑 Видалити вибрані</button><button class="btn-danger" onclick="deleteFilteredCdks()">🗑 Видалити цей список</button><div style="color:#94a3b8;font-weight:800;margin-left:auto">Вибрано: ${selected.size}</div></div>`}
function toggleSelect(id){if(!isAdmin)return;if(selected.has(id))selected.delete(id);else selected.add(id);render()}
async function deleteSelectedCdks(){if(!isAdmin)return toast('Немає прав','err');if(!selected.size)return toast('Нічого не вибрано','err');const ok=await showConfirm('Видалити вибрані CDK?',`Буде видалено: <b>${selected.size}</b> CDK. Перед цим буде створена резервна копія.`);if(!ok)return;await postApi({type:'cdk',action:'deleteRows',rows:Array.from(selected)});selected.clear();toast('CDK видалено','ok');setTimeout(loadData,1000)}
async function deleteFilteredCdks(){if(!isAdmin)return toast('Немає прав','err');const list=cdks.filter(c=>{if(filterUsed==='active'&&c._used)return false;if(filterUsed==='used'&&!c._used)return false;if(filterUsed==='today'){if(!c.used_at)return false;const today=new Date().toISOString().slice(0,10);if(!String(c.used_at).startsWith(today))return false}if(filterCategory!=='all'&&c.category!==filterCategory)return false;return true});if(!list.length)return toast('Немає що видаляти','err');const ok=await showConfirm('Видалити цей список?',`Буде видалено: <b>${list.length}</b> CDK з поточного фільтру. Перед цим буде створена резервна копія.`);if(!ok)return;await postApi({type:'cdk',action:'deleteRows',rows:list.map(x=>x._id)});selected.clear();toast('Список видалено','ok');setTimeout(loadData,1000)}
function cdkCard(c){const adminBtns=isAdmin?`<button class="btn-icon btn-edit" onclick="openEditCdk(${c._id})">${svgEdit}</button><button class="btn-icon btn-del" onclick="deleteCdk(${c._id})">${svgTrash}</button>`:`<button class="btn-icon btn-edit" onclick="openEditCdk(${c._id})">${svgEdit}</button>`;const usedBy=c._used&&c.used_by?`<div class="field-note" style="color:#facc15">👤 Використав: ${esc(c.used_by)}</div>`:'';const workerToggle=`<button class="btn-toggle ${c._used?'used':'active'}" onclick="workerToggleCdk(${c._id})">${c._used?'✗ Використано':'✓ Активний'}</button>`;const codeDisplay=c._used?`<span class="cdk-code masked" id="cc-${c._id}">${'•'.repeat((c.code||'').length)}</span><button class="btn-reveal" onclick="revealCdk(${c._id},'${esc(c.code)}')">👁</button>`:`<span class="cdk-code active">${esc(c.code)}</span>${copyBtn(c.code)}`;return `<div class="cdk-card ${c._used?'used':'active'}"><div class="cdk-head"><div class="cdk-title">${isAdmin?`<input type="checkbox" class="cdk-select" ${selected.has(c._id)?'checked':''} onclick="event.stopPropagation();toggleSelect(${c._id})">`:''}${catIcon(c.category)}${esc(c.category||'CDK')}</div><div class="cdk-controls">${workerToggle}${adminBtns}</div></div><div class="cdk-code-box">${codeDisplay}</div>${usedBy}${c.note&&String(c.note).toLowerCase()!=='false'?`<div class="field-note">${esc(c.note)}</div>`:''}</div>`}
function revealCdk(id,code){const el=document.getElementById('cc-'+id);if(!el)return;el.textContent=el.textContent.includes('•')?code:'•'.repeat(code.length)}
async function postApi(payload){await fetch(API_URL,{method:'POST',mode:'no-cors',body:JSON.stringify({...payload,user:currentUser||localStorage.getItem('workerName')||'Unknown'})})}
async function workerToggleCdk(id){const c=cdks[id];if(!c)return;const newStatus=!c._used;await postApi({type:'cdk',action:'toggle',row:id,used:newStatus?'TRUE':'FALSE'});toast(newStatus?'CDK позначено використаним':'CDK повернено в активні','ok');setTimeout(loadData,1000)}
async function deleteCdk(id){if(!isAdmin)return toast('Видаляти може тільки адмін','err');const ok=await showConfirm('Видалити CDK?','Цей код буде видалено. Перед цим буде створена резервна копія.');if(!ok)return;await postApi({type:'cdk',action:'delete',row:id});toast('CDK видалено','ok');setTimeout(loadData,1000)}
function copyText(text,btnEl){navigator.clipboard.writeText(text).then(()=>{btnEl.innerHTML='✓ OK';btnEl.classList.add('ok');setTimeout(()=>{btnEl.innerHTML='▣ Копіювати';btnEl.classList.remove('ok')},1400)})}
function copyBtn(text){return `<button class="btn-copy" onclick="copyText('${esc(text)}',this)">▣ Копіювати</button>`}
function openAddModal(){if(!isAdmin)return toast('Додавати може тільки адмін','err');editId=null;document.getElementById('modal-title').textContent=currentTab==='accounts'?'Новий акаунт':'Новий CDK';document.getElementById('modal-body').innerHTML=currentTab==='accounts'?accForm(null):cdkForm(null);document.getElementById('modal').style.display='flex'}
function openEditAcc(id){if(!isAdmin)return toast('Акаунти редагує тільки адмін','err');editId=id;document.getElementById('modal-title').textContent='Редагувати акаунт';document.getElementById('modal-body').innerHTML=accForm(accounts[id]);document.getElementById('modal').style.display='flex'}
function openEditCdk(id){editId=id;document.getElementById('modal-title').textContent='Редагувати CDK';document.getElementById('modal-body').innerHTML=cdkForm(cdks[id]);document.getElementById('modal').style.display='flex'}
function closeModal(){document.getElementById('modal').style.display='none'}
function accForm(a){const t=a?(a.type||'xbox').toLowerCase():'xbox';return `<div><div class="form-field"><label class="form-label">Тип</label><div class="type-btns"><button class="type-btn${t==='xbox'?' sel':''}" id="tb-xbox" onclick="selType('xbox')">🎮 Xbox</button><button class="type-btn${t==='itunes'?' sel':''}" id="tb-itunes" onclick="selType('itunes')">🍎 iTunes</button></div><input type="hidden" id="f-type" value="${t}"></div><div class="form-field"><label class="form-label">Логін / Email</label><input class="form-input" id="f-login" value="${esc(a?.login||'')}"></div><div class="form-field"><label class="form-label">Пароль</label><div class="pass-field"><input class="form-input" type="password" id="f-pass" value="${esc(a?.password||'')}"><button class="pass-toggle" onclick="togglePw('f-pass',this)">👁</button></div></div><div class="form-field"><label class="form-label">Посилання</label><input class="form-input" id="f-link" value="${esc(a?.link||'')}"></div><div class="form-field"><label class="form-label">Телефон / 2FA</label><input class="form-input" id="f-phone" value="${esc(a?.phone_code||'')}"></div><div class="form-field"><label class="form-label">Ціна</label><input class="form-input" id="f-rate" value="${esc(a?.rate||'')}"></div><div class="form-field"><label class="form-label">Нотатка</label><textarea class="form-input" id="f-note">${esc(a?.note||'')}</textarea></div><div class="form-field" style="background:#f59e0b10;border:1px solid #f59e0b30;border-radius:10px;padding:12px;font-size:12px;color:#fbbf24">💡 Акаунти поки додаються через копіювання рядка в Google Таблицю.</div><div class="form-footer"><button class="btn-cancel" onclick="closeModal()">Скасувати</button><button class="btn-primary" style="width:auto" onclick="saveAccForm()">Зберегти</button></div></div>`}
function cdkForm(c){const used=c?c._used:false;const cat=c?.category||(filterCategory!=='all'?filterCategory:'Spotify');const canEditCode=isAdmin;return `<div><div class="form-field"><label class="form-label">Категорія</label><select class="form-input" id="f-category" ${!isAdmin?'disabled':''}>${CATEGORIES.map(x=>`<option value="${x}" ${cat===x?'selected':''}>${x}</option>`).join('')}</select></div><div class="form-field"><label class="form-label">CDK Код</label>${c?`<input class="form-input code-inp" id="f-code" value="${esc(c?.code||'')}" ${!canEditCode?'disabled':''} oninput="this.value=this.value.toUpperCase()">`:`<textarea class="form-input code-inp" id="f-bulk-codes" style="min-height:180px" placeholder="Встав один або багато CDK кодів сюди"></textarea>`}</div><div class="status-row"><span class="form-label" style="margin:0">Статус:</span><button class="btn-toggle ${used?'used':'active'}" id="f-status-btn" onclick="toggleFormStatus()">${used?'✗ Використано':'✓ Активний'}</button><input type="hidden" id="f-status" value="${used}"></div><div class="form-field"><label class="form-label">Нотатка</label><textarea class="form-input" id="f-note">${esc(c?.note||'')}</textarea></div><div class="form-footer"><button class="btn-cancel" onclick="closeModal()">Скасувати</button><button class="btn-primary" style="width:auto" onclick="saveCdkForm()">Зберегти</button></div></div>`}
function selType(t){document.getElementById('f-type').value=t;document.getElementById('tb-xbox').className='type-btn'+(t==='xbox'?' sel':'');document.getElementById('tb-itunes').className='type-btn'+(t==='itunes'?' sel':'')}
function toggleFormStatus(){const inp=document.getElementById('f-status'),btn=document.getElementById('f-status-btn'),now=inp.value==='true';inp.value=!now;btn.className='btn-toggle '+(!now?'used':'active');btn.textContent=!now?'✗ Використано':'✓ Активний'}
function saveAccForm(){if(!isAdmin)return toast('Акаунти редагує тільки адмін','err');const data={type:document.getElementById('f-type').value,login:document.getElementById('f-login').value,password:document.getElementById('f-pass').value,link:document.getElementById('f-link').value,phone_code:document.getElementById('f-phone').value,rate:document.getElementById('f-rate').value,note:document.getElementById('f-note').value};prompt('Скопіюй рядок для таблиці Accounts (Ctrl+C):',`${data.type}\t${data.login}\t${data.password}\t${data.link}\t${data.phone_code}\t${data.rate}\t${data.note}`);closeModal()}
async function saveCdkForm(){const isEdit=editId!==null,category=document.getElementById('f-category').value,used=document.getElementById('f-status').value==='true'?'TRUE':'FALSE',note=document.getElementById('f-note').value;if(!isEdit){if(!isAdmin)return toast('Додавати може тільки адмін','err');const raw=document.getElementById('f-bulk-codes').value;const codes=raw.match(/[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}/g)?.map(x=>x.trim().toUpperCase())||[];if(!codes.length){await showConfirm('CDK не знайдено','Встав коди формату <b>67c72481-378f-49ae-a6b1-9cbb9236e280</b>');return}const uniqueCodes=[...new Set(codes)],existingCodes=cdks.map(x=>String(x.code||'').toUpperCase()),filteredCodes=uniqueCodes.filter(code=>!existingCodes.includes(code));if(!filteredCodes.length){await showConfirm('Дублікати','Усі ці CDK вже є в таблиці. Нових кодів для додавання немає.');return}const ok=await showConfirm('Додати CDK коди?',`Ти додаєш <b>${filteredCodes.length}</b> CDK у категорію <b>${category}</b>.<br>Продовжити?`,'add');if(!ok)return;await postApi({type:'cdk',action:'bulkAdd',category,label:category,used,note,codes:filteredCodes});toast('CDK додано','ok')}else{const payload={type:'cdk',action:'update',row:editId,label:category,used,note,category};payload.code=isAdmin?document.getElementById('f-code').value:(cdks[editId]?.code||'');await postApi(payload);toast('CDK оновлено','ok')}closeModal();setTimeout(loadData,1000)}
function showConfirm(title,text,type='danger'){return new Promise(resolve=>{confirmResolve=resolve;const isAdd=type==='add';document.getElementById('modal-title').textContent='';document.getElementById('modal-body').innerHTML=`<div class="confirm-box ${isAdd?'confirm-add':'confirm-danger'}" style="position:relative"><button class="confirm-x" onclick="confirmNo()">✕</button><div class="confirm-icon">${isAdd?'🔑':'🗑'}</div><div class="confirm-title">${title}</div><div class="confirm-text">${text}</div><div class="confirm-actions"><button class="btn-cancel" onclick="confirmNo()">Скасувати</button><button class="${isAdd?'btn-confirm-add':'btn-danger'}" onclick="confirmYes()">${isAdd?'＋ Додати':'🗑 Підтвердити'}</button></div></div>`;document.getElementById('modal').style.display='flex'})}
function confirmYes(){document.getElementById('modal').style.display='none';if(confirmResolve)confirmResolve(true)}function confirmNo(){document.getElementById('modal').style.display='none';if(confirmResolve)confirmResolve(false)}
function toast(text,type='ok'){const box=document.getElementById('toast');if(!box)return;const el=document.createElement('div');el.className='toast-msg '+type;el.textContent=text;box.appendChild(el);setTimeout(()=>el.remove(),2500)}
function togglePw(id,btn){const inp=document.getElementById(id);inp.type=inp.type==='password'?'text':'password';btn.innerHTML=inp.type==='password'?'👁':'🙈'}
function catIcon(cat){const files={Spotify:['spotify.png','spotify'],Claude:['claude.png','claude'],ChatGPT:['chatgpt.png','chatgpt'],Grok:['grok.png','grok']};const item=files[cat];if(!item)return'🔑';return `<img src="${item[0]}" class="cat-icon ${item[1]}" alt="${cat}">`}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
const svgEdit=`<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
const svgTrash=`<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`;
window.addEventListener('load',()=>{const savedRole=localStorage.getItem('managerRole');if(savedRole==='admin'){isAdmin=true;startApp()}if(savedRole==='worker'){isAdmin=false;startApp()}});
</script>
</body>
</html>
